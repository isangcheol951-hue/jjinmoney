<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>찐머니 매거진 v2.5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700;900&family=Noto+Sans+KR:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #FAF8F4;
    --card: #FFFFFF;
    --ink: #1C1B19;
    --ink-soft: #837C70;
    --green: #1F5C4A;
    --green-soft: #E4EEE9;
    --gold: #D9A441;
    --coral: #E2624F;
    --line: #E7E0D3;
    --serif: 'Noto Serif KR', serif;
    --sans: 'Noto Sans KR', sans-serif;
    --mono: 'Space Mono', monospace;
  }
  * { box-sizing: border-box; margin:0; padding:0; }
  body { background: var(--paper); color: var(--ink); font-family: var(--sans); line-height:1.65; -webkit-font-smoothing:antialiased; }
  
  /* 화면 가로폭 변동 시 상단 왜곡 방어 격리 조항 */
  body.modal-open { overflow: hidden; padding-right: 0px !important; }
  
  a { color:inherit; text-decoration:none; }
  .wrap { max-width: 1080px; margin:0 auto; padding: 0 24px; }
  button { font-family: var(--sans); cursor:pointer; }

  /* MASTHEAD & 고정 레이아웃 */
  .masthead { border-bottom: 2px solid var(--ink); padding: 26px 0 16px; width: 100%; box-sizing: border-box; }
  .masthead-top { display:flex; justify-content:space-between; align-items:baseline; }
  .masthead-issue { font-family: var(--mono); font-size:12px; color: var(--ink-soft); letter-spacing:.05em; }
  .masthead-title { font-family: var(--serif); font-weight:900; font-size:44px; text-align:center; margin: 8px 0 4px; letter-spacing:-0.01em; white-space: nowrap; }
  .masthead-sub { text-align:center; font-size:13px; color: var(--ink-soft); font-family: var(--mono); letter-spacing:.04em; white-space: nowrap; }
  .masthead-nav { display:flex; justify-content:center; gap:26px; margin-top:18px; font-size:13px; font-weight:700; }
  .masthead-nav a { padding-bottom:4px; border-bottom:2px solid transparent; }
  .masthead-nav a:hover { border-color: var(--gold); }
  
  /* 최상단 검색 바 스타일 */
  .top-search-container { margin: 24px 0 10px; position: relative; }
  .top-search-input { width:100%; padding:14px 40px 14px 18px; border:2px solid var(--ink); border-radius:12px; font-size:15px; font-family:var(--sans); background:var(--card); font-weight:500; }
  .top-search-input:focus { outline: none; border-color: var(--green); }
  .top-search-clear { position:absolute; right:16px; top:50%; transform:translateY(-50%); background:none; border:none; font-size:18px; color:var(--ink-soft); display:none; }

  .add-btn {
    position: fixed; right: 28px; bottom: 28px; z-index: 50;
    background: var(--ink); color: var(--paper); border:none;
    padding: 16px 24px; border-radius: 999px; font-weight:700; font-size:14px;
    box-shadow: 0 12px 30px -10px rgba(0,0,0,0.4);
    display:flex; align-items:center; gap:8px;
  }
  .add-btn:hover { background: var(--green); }

  /* FEATURED */
  .featured { padding: 24px 0 20px; }
  .eyebrow { font-family: var(--mono); font-size:12px; color: var(--coral); letter-spacing:.06em; margin-bottom:10px; }

  .issue-highlight {
    position: relative;
    display:grid; grid-template-columns: 1fr 1.2fr; gap: 40px; align-items:center;
    background: var(--card); border:2px solid var(--gold); border-radius: 18px; overflow:hidden;
    box-shadow: 0 18px 36px -22px rgba(217,164,65,0.5);
  }
  @media (max-width: 800px){ .issue-highlight{ grid-template-columns:1fr; gap: 20px; } }
  .issue-badge {
    position:absolute; top:16px; left:16px; z-index:2;
    background: var(--gold); color: var(--ink); font-family: var(--mono); font-size:11px; font-weight:700;
    padding:5px 12px; border-radius:999px; letter-spacing:.04em;
  }
  .featured-visual {
    height: 320px; display:flex; align-items:center; justify-content:center; font-size:96px;
    background: linear-gradient(135deg, var(--green-soft), #fff);
  }
  .featured-body { padding: 12px 36px 12px 0; }
  @media (max-width: 800px){ .featured-body{ padding: 0 24px 32px; } }
  .featured-body h2 { font-family: var(--serif); font-size:30px; line-height:1.4; margin-bottom:12px; }
  .featured-body p { color: var(--ink-soft); font-size:14.5px; margin-bottom:18px; }
  .tip-badge {
    display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:12px;
    background: var(--green-soft); color: var(--green); padding:5px 12px; border-radius:999px; font-weight:700;
  }

  .issue-recent-head { font-family: var(--mono); font-size:11.5px; color: var(--ink-soft); letter-spacing:.05em; margin: 28px 0 12px; }
  .issue-recent { display:grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  @media (max-width: 860px){ .issue-recent{ grid-template-columns: repeat(2,1fr);} }
  .issue-recent-card {
    background: var(--card); border:1px solid var(--line); border-radius:12px; padding: 14px 16px;
    cursor:pointer; transition: border-color .15s ease;
  }
  .issue-recent-card:hover { border-color: var(--gold); }
  .issue-recent-card .cat { font-family: var(--mono); font-size:10.5px; color: var(--coral); margin-bottom:6px; }
  .issue-recent-card .title { font-family: var(--serif); font-size:14px; line-height:1.4; font-weight:700; }

  /* 탭 시스템 */
  .target-tabs { display: flex; gap: 4px; border-bottom: 2px solid var(--ink); margin-top: 40px; }
  .target-tab {
    padding: 12px 20px; font-family: var(--serif); font-size: 15.5px; font-weight: 700;
    background: none; border: none; color: var(--ink-soft); cursor: pointer; position: relative;
    transition: color .2s ease;
  }
  .target-tab.active { color: var(--ink); }
  .target-tab.active::after { content: ''; position: absolute; bottom: -2px; left: 0; right: 0; height: 4px; background: var(--green); }

  /* SECTION HEAD */
  .section-head { margin: 24px 0 20px; border-bottom:1px solid var(--line); padding-bottom:14px; display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 16px; }
  .section-title-area h3 { font-family: var(--serif); font-size:22px; margin-bottom:4px; }
  
  .view-controls { display: flex; gap: 6px; }
  .view-btn {
    background: var(--card); border: 1px solid var(--line); padding: 6px 12px; font-size: 12px;
    border-radius: 6px; font-weight: 500; color: var(--ink-soft); transition: all .15s ease;
  }
  .view-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  /* FILTER TAGS */
  .filter-main { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px; width: 100%; }
  .filter-main .ftag { font-family: var(--mono); font-size:12.5px; padding:8px 16px; border-radius:999px; border:1px solid var(--ink); color: var(--ink); background:var(--card); font-weight:700; cursor: pointer; }
  .filter-main .ftag.active { background: var(--ink); color: var(--paper); }

  .filter-sub { display:flex; gap:7px; flex-wrap:wrap; width: 100%; }
  .filter-sub .ftag { font-family: var(--mono); font-size:11px; padding:5px 12px; border-radius:999px; border:1px solid var(--line); color: var(--ink-soft); background:var(--card); cursor: pointer; }
  .filter-sub .ftag.active { background: var(--gold); color: var(--ink); border-color: var(--gold); font-weight:700; }

  /* GRID VIEW */
  .grid { display:grid; grid-template-columns: repeat(3, 1fr); gap: 24px; padding: 22px 0 60px; }
  @media (max-width: 860px){ .grid{ grid-template-columns: repeat(2,1fr);} }
  @media (max-width: 580px){ .grid{ grid-template-columns: 1fr;} }

  .grid .card {
    background: var(--card); border:1px solid var(--line); border-radius:16px; overflow:hidden;
    display:flex; flex-direction:column; cursor:pointer; transition: transform .15s ease, box-shadow .15s ease;
  }
  .grid .card:hover { transform: translateY(-4px); box-shadow: 0 16px 30px -18px rgba(0,0,0,.35); }
  .grid .card-visual { height: 150px; display:flex; align-items:center; justify-content:center; font-size:48px; position:relative; }
  .grid .card-badge { position:absolute; top:10px; right:10px; background: var(--card); border:1px solid var(--line); font-family: var(--mono); font-size:10px; font-weight:700; padding:4px 8px; border-radius:999px; color: var(--ink); }
  .grid .card-body { padding: 16px 18px 20px; flex:1; display:flex; flex-direction:column; }
  .grid .card-cat { font-family: var(--mono); font-size:11px; color: var(--coral); margin-bottom:8px; }
  .grid .card-title { font-family: var(--serif); font-weight:700; font-size:17px; line-height:1.4; margin-bottom:8px; }
  .grid .card-desc { font-size:13px; color: var(--ink-soft); flex:1; }

  /* LIST VIEW */
  .grid.list-mode { grid-template-columns: 1fr; gap: 10px; padding: 12px 0 40px; }
  .grid.list-mode .card { flex-direction: row; align-items: center; padding: 12px 20px; background: var(--card); border: 1px solid var(--line); border-radius: 10px; gap: 16px; }
  .grid.list-mode .card:hover { transform: none; border-color: var(--gold); box-shadow: none; }
  .grid.list-mode .card-visual { height: 40px; width: 40px; min-width: 40px; font-size: 24px; background: none !important; }
  .grid.list-mode .card-badge { display: none; }
  .grid.list-mode .card-body { padding: 0; flex-direction: row; align-items: center; justify-content: space-between; width: 100%; gap: 16px; }
  .grid.list-mode .card-title-group { flex: 1; }
  .grid.list-mode .card-cat { display: none; }
  .grid.list-mode .card-title { font-size: 15px; margin-bottom: 2px; }
  .grid.list-mode .card-desc { font-size: 12.5px; color: var(--ink-soft); }
  .grid.list-mode .card-meta-right { font-family: var(--mono); font-size: 12px; color: var(--ink-soft); white-space: nowrap; }

  .empty { text-align:center; padding: 60px 20px; color: var(--ink-soft); width: 100%; grid-column: 1/-1; }
  .empty .icon { font-size:40px; margin-bottom:12px; }
  .empty-reset { color: var(--green); text-decoration: underline; font-weight: 700; cursor: pointer; margin-top: 8px; display: inline-block; }

  /* MODALS & AUTOCLOSE SCROLL */
  .overlay { position:fixed; inset:0; background: rgba(28,27,25,0.5); display:none; align-items:center; justify-content:center; z-index:100; padding:20px; }
  .overlay.show { display:flex; }
  
  .modal { background: var(--paper); border-radius:20px; max-width: 720px; width:100%; max-height: 88vh; overflow-y:auto; padding: 40px 40px 120px 40px; position: relative; }
  .scroll-end-hint { text-align: center; font-size: 13px; color: var(--ink-soft); margin-top: 60px; padding: 16px; border-top: 1px dashed var(--line); font-family: var(--mono); }
  .modal-close { float:right; background:none; border:none; font-size:20px; color: var(--ink-soft); }
  .modal h3 { font-family: var(--serif); font-size:24px; margin-bottom: 22px; clear:both; }
  
  .detail-cat { font-family: var(--mono); font-size: 13px; color: var(--coral); letter-spacing: .05em; margin-bottom: 12px; }
  .detail-title { font-family: var(--serif); font-size: 32px; font-weight: 700; line-height: 1.35; margin-bottom: 16px; color: var(--ink); }
  .detail-meta { font-family: var(--mono); font-size: 12px; color: var(--ink-soft); margin-bottom: 28px; padding-bottom: 16px; border-bottom: 1px solid var(--line); }
  
  .detail-body { font-family: var(--sans); font-size: 16px; line-height: 1.75; color: #2C2A29; }
  .detail-body p { margin-bottom: 20px; }
  .detail-body h4 { font-family: var(--serif); font-size: 19px; font-weight: 700; margin: 32px 0 12px; color: var(--green); }
  .detail-body ul, .detail-body ol { margin: 12px 0 20px 20px; }
  .detail-body li { margin-bottom: 8px; }
  .detail-body strong { color: var(--ink); font-weight: 700; }

  /* FIELDS & TOAST */
  .field { margin-bottom:16px; }
  .field label { display:block; font-size:12.5px; font-weight:700; margin-bottom:6px; color: var(--ink); }
  .field input, .field select, .field textarea { width:100%; padding:11px 14px; border:1px solid var(--line); border-radius:10px; font-family: var(--sans); font-size:14px; background: var(--card); }
  .field textarea { min-height: 160px; resize: vertical; line-height:1.6; }
  .submit-btn { width:100%; background: var(--green); color:#fff; border:none; padding:14px; border-radius:999px; font-weight:700; font-size:15px; margin-top:6px; }
  
  footer { text-align:center; padding: 30px 0 60px; color: var(--ink-soft); font-size:12.5px; }
  .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--ink); color: var(--paper); padding: 12px 22px; border-radius:999px; font-size:13.5px; transition: transform .25s ease; z-index: 200; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* QUIZ & 성향 */
  .quiz-eyebrow { font-family: var(--mono); font-size:11.5px; color: var(--coral); margin-bottom:6px; }
  .quiz-result { text-align:center; }
  .quiz-restart { margin-top:16px; background:none; border:1.5px solid var(--ink); color:var(--ink); padding:10px 20px; border-radius:999px; font-weight:700; font-size:13px; }
</style>
</head>
<body>

<div class="masthead">
  <div class="wrap masthead-top">
    <span class="masthead-issue">2026 · VOL. <span id="issue-num">01</span></span>
    <span class="masthead-issue">실시간 통합 검색 엔진 가동 완료</span>
  </div>
  <div class="masthead-title">찐머니</div>
  <div class="masthead-sub">JJINMONEY — 직장인 집중 최적화 금융 가이드 솔루션</div>
  <div class="masthead-nav">
    <a href="#featured">이번 호</a>
    <a href="#archive">아카이브</a>
    <a href="#" onclick="openQuiz();return false;">성향진단</a>
  </div>
</div>

<div class="wrap">
  <!-- 최상단 실시간 키워드 검색창 전면 전진 배치 -->
  <div class="top-search-container">
    <input type="text" id="search-input" class="top-search-input" placeholder="🔍 찾으시는 절세 항목, 성향(햄스터/사자/여우) 및 지침 키워드를 입력 즉시 본문까지 검색합니다..." oninput="handleSearch(this.value)">
    <button id="search-clear" class="top-search-clear" onclick="clearSearch()">✕</button>
  </div>

  <section class="featured" id="featured">
    <div class="eyebrow">// EDITOR'S PICK</div>
    <div class="issue-highlight" id="issue-highlight"></div>
    <div class="issue-recent-head">최근 발행</div>
    <div class="issue-recent" id="issue-recent"></div>
  </section>

  <!-- 대분류 축 탭 시스템 -->
  <div class="target-tabs">
    <button class="target-tab active" id="tab-employee" onclick="setTargetTab('employee')">🏛️ 직장인 (근로소득)</button>
    <button class="target-tab" id="tab-freelancer" onclick="setTargetTab('freelancer')">🧑‍💻 프리랜서 (3.3%)</button>
    <button class="target-tab" id="tab-corporate" onclick="setTargetTab('corporate')">🏢 법인 기업 (CEO)</button>
  </div>

  <div class="section-head" id="archive">
    <div class="section-title-area">
      <h3>프리미엄 지침 아카이브</h3>
    </div>
    
    <div class="controls-block">
      <div class="view-controls">
        <button class="view-btn active" id="btn-grid" onclick="setViewMode('grid')">㗊 바둑판식</button>
        <button class="view-btn" id="btn-list" onclick="setViewMode('list')">☰ 리스트식</button>
      </div>
    </div>
    
    <div class="filter-main" id="filter-main"></div>
    <div class="filter-sub" id="filter-sub"></div>
  </div>

  <div class="grid" id="grid"></div>

  <footer>© 2026 찐머니 매거진</footer>
</div>

<button class="add-btn" onclick="openAddModal()">✎ 새 가이드 올리기</button>

<!-- ADD MODAL -->
<div class="overlay" id="add-overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeAddModal()">✕</button>
    <h3>새 가이드 올리기</h3>
    <div class="field">
      <label>대상 대분류</label>
      <select id="f-target" onchange="onTargetTabChangeInModal()">
        <option value="employee">🏛️ 직장인 (Employee)</option>
        <option value="freelancer">🧑‍💻 프리랜서 (Freelancer)</option>
        <option value="corporate">🏢 법인 기업 (Corporate)</option>
      </select>
    </div>
    <div class="field">
      <label>카테고리</label>
      <select id="f-category" onchange="onMainCategoryChange()"></select>
    </div>
    <div class="field">
      <label>소분류</label>
      <select id="f-subcategory"></select>
    </div>
    <div class="field">
      <label>제목</label>
      <input id="f-title" placeholder="예: 카드 문턱 돌파 6:4 황금비율">
    </div>
    <div class="field">
      <label>한 줄 요약</label>
      <input id="f-desc" placeholder="카드에 보일 짧은 설명">
    </div>
    <div class="field">
      <label>대표 이모지</label>
      <input id="f-emoji" placeholder="🧾" maxlength="2">
    </div>
    <div class="field">
      <label>본문</label>
      <textarea id="f-body" placeholder="내용을 입력하십시오."></textarea>
    </div>
    <button class="submit-btn" id="submit-btn" onclick="submitArticle()">가이드 저장하기</button>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="overlay" id="detail-overlay">
  <div class="modal" id="detail-modal" onscroll="handleModalScroll(this)">
    <button class="modal-close" onclick="closeDetailModal()">✕</button>
    <div id="detail-content"></div>
    <div class="scroll-end-hint">↓ 조금 더 아래로 스크롤하면 창이 자동으로 닫힙니다 (자유도 종료 시스템)</div>
  </div>
</div>

<!-- QUIZ MODAL -->
<div class="overlay" id="quiz-overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeQuiz()">✕</button>
    <div class="quiz-eyebrow">// 찐머니 성향진단</div>
    <h3>나에게 딱 맞는 자산배분 상품은?</h3>
    <div id="quiz-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const TABS_MAP = {
  employee: {
    "수익 늘리기": ["부수입", "투자", "정부정책"],
    "비용 줄이기": ["변동비", "소비"],
    "절세": ["기본", "심화", "성향별"]
  },
  freelancer: {
    "세금 관리": ["사업소득", "종합소득세"]
  },
  corporate: {
    "자산 구조화": ["배당정책", "가업승계"]
  }
};

const CAT_EMOJI = { "수익 늘리기":"💵", "비용 줄이기":"📉", "절세":"🧾", "세금 관리":"🏛️", "자산 구조화":"🏢" };
const CAT_COLOR = { "수익 늘리기":"#E4EEE9", "비용 줄이기":"#FDECE9", "절세":"#FBF1DD", "세금 관리":"#E4EEE9", "자산 구조화":"#E4EEE9" };

// 지금까지 축적된 15개 심화 콘텐츠 풀 셋 마운트
const SEED = [
  { id:"e12", target:"employee", category:"수익 늘리기", subcategory:"부수입", title:"글로벌 디자인 에셋 마켓(Adobe Stock) 셀러 진입과 노력 비례 자산화 공식", desc:"내 시간을 영구적인 글로벌 외화 로열티 자산(IP)으로 치환하는 정석 패린", emoji:"🎨",

];

let articles = [];
let activeTarget = "employee";
let activeMain = "전체";
let activeSub = "전체";
let currentViewMode = "grid";  
let searchQuery = "";

// ===== 자율성 스크롤 종료 및 흔들림 방지 통합 메커니즘 =====
function handleModalScroll(el) {
  const scrollTop = el.scrollTop;
  const scrollHeight = el.scrollHeight;
  const clientHeight = el.clientHeight;
  if (scrollTop + clientHeight >= scrollHeight - 5) {
    setTimeout(() => {
      closeDetailModal();
      el.scrollTop = 0;
    }, 250);
  }
}

async function loadArticles() {
  articles = [...SEED];
  updateCategorySelectsForModal();
  render();
}

function setTargetTab(target) {
  activeTarget = target;
  activeMain = "전체";
  activeSub = "전체";
  
  document.getElementById('tab-employee').classList.toggle('active', target === 'employee');
  document.getElementById('tab-freelancer').classList.toggle('active', target === 'freelancer');
  document.getElementById('tab-corporate').classList.toggle('active', target === 'corporate');
  
  render();
}

function setViewMode(mode) {
  currentViewMode = mode;
  document.getElementById('btn-grid').classList.toggle('active', mode === 'grid');
  document.getElementById('btn-list').classList.toggle('active', mode === 'list');
  renderGrid();
}

// 본문+제목+요약 동기화 실시간 텍스트 매칭 검색 엔진
function handleSearch(val) {
  searchQuery = val.trim().toLowerCase();
  document.getElementById('search-clear').style.display = searchQuery ? 'block' : 'none';
  render(); 
}

function clearSearch() {
  document.getElementById('search-input').value = "";
  searchQuery = "";
  document.getElementById('search-clear').style.display = 'none';
  render(); 
}

function updateCategorySelectsForModal() {
  const modalTarget = document.getElementById('f-target').value;
  const mainSel = document.getElementById('f-category');
  const cats = TABS_MAP[modalTarget];
  mainSel.innerHTML = Object.keys(cats).map(c => `<option>${c}</option>`).join('');
  onMainCategoryChange();
}

function onTargetTabChangeInModal() { updateCategorySelectsForModal(); }
function onMainCategoryChange() {
  const modalTarget = document.getElementById('f-target').value;
  const main = document.getElementById('f-category').value;
  const subSel = document.getElementById('f-subcategory');
  const subs = TABS_MAP[modalTarget][main] || [];
  subSel.innerHTML = subs.map(s => `<option>${s}</option>`).join('');
}

function render() {
  let targetFiltered = articles.filter(a => (a.target || 'employee') === activeTarget);
  
  // 검색어 필터 동기화
  if (searchQuery) {
    targetFiltered = targetFiltered.filter(a => 
      a.title.toLowerCase().includes(searchQuery) || 
      (a.desc && a.desc.toLowerCase().includes(searchQuery)) || 
      (a.body && a.body.toLowerCase().includes(searchQuery))
    );
  }

  document.getElementById('issue-num').textContent = String(targetFiltered.length).padStart(2,'0');

  const highlight = targetFiltered[0];
  const hEl = document.getElementById('issue-highlight');
  if (highlight) {
    hEl.innerHTML = `
      <span class="issue-badge">매칭 핵심 지침</span>
      <div class="featured-visual">${highlight.emoji || '🏛️'}</div>
      <div class="featured-body">
        <div class="eyebrow">${highlight.category} · ${highlight.subcategory || ''}</div>
        <h2>${escapeHtml(highlight.title)}</h2>
        <p>${escapeHtml(highlight.desc || '')}</p>
        <span class="tip-badge" onclick="openDetail('${highlight.id}')" style="cursor:pointer">지침 정밀 분석 열기 (스크롤 다운 자동종료 지원) →</span>
      </div>`;
  } else {
    hEl.innerHTML = `<div class="empty"><div class="icon">🔍</div>'${escapeHtml(searchQuery)}' 키워드를 포함한 지침을 아카이브에서 찾을 수 없습니다.</div>`;
  }

  const recentEl = document.getElementById('issue-recent');
  const recent = targetFiltered.slice(1, 5);
  recentEl.innerHTML = recent.map(a => `
    <div class="issue-recent-card" onclick="openDetail('${a.id}')">
      <div class="cat">${a.category}</div>
      <div class="title">${escapeHtml(a.title)}</div>
    </div>
  `).join('');

  const fm = document.getElementById('filter-main');
  const mains = ["전체", ...Object.keys(TABS_MAP[activeTarget])];
  fm.innerHTML = mains.map(c => `<span class="ftag ${c===activeMain?'active':''}" onclick="setMainFilter('${c}')">${c}</span>`).join('');

  const fs = document.getElementById('filter-sub');
  if (activeMain === "전체") {
    fs.innerHTML = '';
  } else {
    const subs = ["전체", ...TABS_MAP[activeTarget][activeMain]];
    fs.innerHTML = subs.map(s => `<span class="ftag ${s===activeSub?'active':''}" onclick="setSubFilter('${s}')">${s}</span>`).join('');
  }

  renderGrid();
}

function renderGrid() {
  let list = articles.filter(a => (a.target || 'employee') === activeTarget);
  if (activeMain !== "전체") list = list.filter(a => a.category === activeMain);
  if (activeMain !== "전체" && activeSub !== "전체") list = list.filter(a => a.subcategory === activeSub);

  if (searchQuery) {
    list = list.filter(a => 
      a.title.toLowerCase().includes(searchQuery) || 
      (a.desc && a.desc.toLowerCase().includes(searchQuery)) || 
      (a.body && a.body.toLowerCase().includes(searchQuery))
    );
  }

  const grid = document.getElementById('grid');
  grid.className = `grid ${currentViewMode === 'list' ? 'list-mode' : ''}`;

  if (!list.length) {
    grid.innerHTML = `<div class="empty">부합하는 프리미엄 지침이 없습니다. <span class="empty-reset" onclick="clearSearch()">검색 초기화</span></div>`;
    return;
  }

  if (currentViewMode === 'list') {
    grid.innerHTML = list.map(a => `
      <div class="card" onclick="openDetail('${a.id}')">
        <div class="card-visual">${a.emoji || '🏛️'}</div>
        <div class="card-body">
          <div class="card-title-group">
            <div class="card-title">${escapeHtml(a.title)}</div>
            <div class="card-desc">${escapeHtml(a.desc || '')}</div>
          </div>
          <div class="card-meta-right">${a.subcategory || a.category}</div>
        </div>
      </div>
    `).join('');
  } else {
    grid.innerHTML = list.map(a => `
      <div class="card" onclick="openDetail('${a.id}')">
        <div class="card-visual" style="background:${CAT_COLOR[a.category] || '#F1EEE6'}">
          ${a.emoji || '🏛️'}
          <span class="card-badge">${a.subcategory || a.category}</span>
        </div>
        <div class="card-body">
          <div class="card-cat">${a.category}</div>
          <div class="card-title">${escapeHtml(a.title)}</div>
          <div class="card-desc">${escapeHtml(a.desc || '')}</div>
        </div>
      </div>
    `).join('');
  }
}

function setMainFilter(c) { activeMain = c; activeSub = "전체"; render(); }
function setSubFilter(s) { activeSub = s; renderGrid(); }
function escapeHtml(str) { const d = document.createElement('div'); d.textContent = str || ''; return d.innerHTML; }

function openAddModal() { document.getElementById('add-overlay').classList.add('show'); document.body.classList.add('modal-open'); }
function closeAddModal() { document.getElementById('add-overlay').classList.remove('show'); document.body.classList.remove('modal-open'); }

// 모달 내부 상하 역산 내비게이션 연동형 상세 보기
function openDetail(id) {
  let currentList = articles.filter(a => (a.target || 'employee') === activeTarget);
  if (activeMain !== "전체") currentList = currentList.filter(a => a.category === activeMain);
  if (activeMain !== "전체" && activeSub !== "전체") currentList = currentList.filter(a => a.subcategory === activeSub);
  if (searchQuery) {
    currentList = currentList.filter(a => a.title.toLowerCase().includes(searchQuery) || (a.body && a.body.toLowerCase().includes(searchQuery)));
  }

  const currentIndex = currentList.findIndex(x => x.id === id);
  const a = articles.find(x => x.id === id);
  if (!a) return;

  let formattedBody = '';
  const paragraphs = (a.body || '').split('\n');

  paragraphs.forEach(p => {
    let cleanP = p.trim();
    if (!cleanP) return;
    if (cleanP.startsWith('제목:') || cleanP.match(/^[-·]/) || cleanP.startsWith('★') || cleanP.startsWith('※')) {
      formattedBody += `<h4>${cleanP}</h4>`;
    } else {
      formattedBody += `<p>${cleanP}</p>`;
    }
  });

  // 이전/다음 이동 바 동적 구현
  let navControlsHtml = `<div style="display:flex; justify-content:space-between; margin-top:40px; padding-top:20px; border-top:1px solid var(--line);">`;
  if (currentIndex > 0) {
    const prevId = currentList[currentIndex - 1].id;
    navControlsHtml += `<button onclick="openDetail('${prevId}')" style="background:none; border:1px solid var(--ink); padding:8px 14px; border-radius:6px; font-size:13px; font-weight:700;">← 이전 지침</button>`;
  } else {
    navControlsHtml += `<span></span>`;
  }
  if (currentIndex < currentList.length - 1) {
    const nextId = currentList[currentIndex + 1].id;
    navControlsHtml += `<button onclick="openDetail('${nextId}')" style="background:var(--ink); color:var(--paper); border:none; padding:8px 14px; border-radius:6px; font-size:13px; font-weight:700;">다음 지침 →</button>`;
  } else {
    navControlsHtml += `<span></span>`;
  }
  navControlsHtml += `</div>`;

  document.getElementById('detail-content').innerHTML = `
    <div class="detail-cat">${a.category} · ${a.subcategory || ''}</div>
    <div class="detail-title">${escapeHtml(a.title)}</div>
    <div class="detail-meta">정석 배분 알고리즘 기동 완료</div>
    <div class="detail-body">${formattedBody}</div>
    ${navControlsHtml}
  `;
  document.getElementById('detail-overlay').classList.add('show');
  document.body.classList.add('modal-open');
  document.getElementById('detail-modal').scrollTop = 0;
}

function closeDetailModal() { document.getElementById('detail-overlay').classList.remove('show'); document.body.classList.remove('modal-open'); }

function submitArticle() {
  const target = document.getElementById('f-target').value;
  const title = document.getElementById('f-title').value.trim();
  const desc = document.getElementById('f-desc').value.trim();
  const category = document.getElementById('f-category').value;
  const subcategory = document.getElementById('f-subcategory').value;
  const emoji = document.getElementById('f-emoji').value.trim();
  const body = document.getElementById('f-body').value.trim();

  if (!title || !body) { showToast('내용을 입력해 주세요.'); return; }

  const article = { id: 'u_' + Date.now(), target, title, desc, category, subcategory, emoji, body };
  articles.unshift(article);
  closeAddModal();
  showToast('새 지침이 안정적으로 마운트되었습니다.');
  render();
}

function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// 레이아웃 흔들림 교정용 스크립트 결합형 성향진단 모듈
function openQuiz() {
  document.getElementById('quiz-overlay').classList.add('show');
  document.body.classList.add('modal-open'); 
  document.getElementById('quiz-body').innerHTML = `
    <div class="quiz-result">
      <p style="text-align:center; margin-bottom:20px;">자율형 정밀 진단 모듈 세션이 대기 중입니다.</p>
      <button class="quiz-restart" onclick="closeQuiz()">진단 종료하기</button>
    </div>`;
}
function closeQuiz() { 
  document.getElementById('quiz-overlay').classList.remove('show'); 
  document.body.classList.remove('modal-open'); 
}

loadArticles();
</script>
