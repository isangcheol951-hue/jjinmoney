<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>찐머니 매거진</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700;900&family=Noto+Sans+KR:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #FAF8F4;
    --card: #FFFFFF;
    --ink: #1C1B19;
    --ink-soft: #837C70;
    --green: #1F5C4A;
    --green-soft: #E4EEE9;
    --gold: #D9A441;
    --coral: #E2624F;
    --line: #E7E0D3;
    --serif: 'Noto Serif KR', serif;
    --sans: 'Noto Sans KR', sans-serif;
    --mono: 'Space Mono', monospace;
  }
  * { box-sizing: border-box; margin:0; padding:0; }
  body { background: var(--paper); color: var(--ink); font-family: var(--sans); line-height:1.65; -webkit-font-smoothing:antialiased; }
  a { color:inherit; text-decoration:none; }
  .wrap { max-width: 1080px; margin:0 auto; padding: 0 24px; }
  button { font-family: var(--sans); cursor:pointer; }

  /* MASTHEAD */
  .masthead { border-bottom: 2px solid var(--ink); padding: 26px 0 16px; }
  .masthead-top { display:flex; justify-content:space-between; align-items:baseline; }
  .masthead-issue { font-family: var(--mono); font-size:12px; color: var(--ink-soft); letter-spacing:.05em; }
  .masthead-title { font-family: var(--serif); font-weight:900; font-size:44px; text-align:center; margin: 8px 0 4px; letter-spacing:-0.01em; }
  .masthead-sub { text-align:center; font-size:13px; color: var(--ink-soft); font-family: var(--mono); letter-spacing:.04em; }
  .masthead-nav { display:flex; justify-content:center; gap:26px; margin-top:18px; font-size:13px; font-weight:700; }
  .masthead-nav a { padding-bottom:4px; border-bottom:2px solid transparent; }
  .masthead-nav a:hover { border-color: var(--gold); }
  
  .add-btn {
    position: fixed; right: 28px; bottom: 28px; z-index: 50;
    background: var(--ink); color: var(--paper); border:none;
    padding: 16px 24px; border-radius: 999px; font-weight:700; font-size:14px;
    box-shadow: 0 12px 30px -10px rgba(0,0,0,0.4);
    display:flex; align-items:center; gap:8px;
  }
  .add-btn:hover { background: var(--green); }

  /* FEATURED */
  .featured { padding: 48px 0 20px; }
  .eyebrow { font-family: var(--mono); font-size:12px; color: var(--coral); letter-spacing:.06em; margin-bottom:10px; }

  .issue-highlight {
    position: relative;
    display:grid; grid-template-columns: 1fr 1.2fr; gap: 40px; align-items:center;
    background: var(--card); border:2px solid var(--gold); border-radius: 18px; overflow:hidden;
    box-shadow: 0 18px 36px -22px rgba(217,164,65,0.5);
  }
  @media (max-width: 800px){ .issue-highlight{ grid-template-columns:1fr; } }
  .issue-badge {
    position:absolute; top:16px; left:16px; z-index:2;
    background: var(--gold); color: var(--ink); font-family: var(--mono); font-size:11px; font-weight:700;
    padding:5px 12px; border-radius:999px; letter-spacing:.04em;
  }
  .featured-visual {
    height: 320px; display:flex; align-items:center; justify-content:center; font-size:96px;
    background: linear-gradient(135deg, var(--green-soft), #fff);
  }
  .featured-body { padding: 12px 36px 12px 0; }
  @media (max-width: 800px){ .featured-body{ padding: 0 24px 32px; } }
  .featured-body h2 { font-family: var(--serif); font-size:30px; line-height:1.4; margin-bottom:12px; }
  .featured-body p { color: var(--ink-soft); font-size:14.5px; margin-bottom:18px; }
  .tip-badge {
    display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:12px;
    background: var(--green-soft); color: var(--green); padding:5px 12px; border-radius:999px; font-weight:700;
  }

  .issue-recent-head {
    font-family: var(--mono); font-size:11.5px; color: var(--ink-soft); letter-spacing:.05em;
    margin: 28px 0 12px;
  }
  .issue-recent { display:grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  @media (max-width: 860px){ .issue-recent{ grid-template-columns: repeat(2,1fr);} }
  .issue-recent-card {
    background: var(--card); border:1px solid var(--line); border-radius:12px; padding: 14px 16px;
    cursor:pointer; transition: border-color .15s ease;
  }
  .issue-recent-card:hover { border-color: var(--gold); }
  .issue-recent-card .cat { font-family: var(--mono); font-size:10.5px; color: var(--coral); margin-bottom:6px; }
  .issue-recent-card .title { font-family: var(--serif); font-size:14px; line-height:1.4; font-weight:700; }

  /* TARGET TABS CONTAINER */
  .target-tabs { display: flex; gap: 4px; border-bottom: 2px solid var(--ink); margin-top: 40px; }
  .target-tab {
    padding: 12px 24px; font-family: var(--serif); font-size: 16px; font-weight: 700;
    background: none; border: none; color: var(--ink-soft); cursor: pointer; position: relative;
    transition: color .2s ease;
  }
  .target-tab.active { color: var(--ink); }
  .target-tab.active::after {
    content: ''; position: absolute; bottom: -2px; left: 0; right: 0; height: 4px; background: var(--green);
  }

  /* SECTION HEAD WITH VIEW TOGGLE */
  .section-head { margin: 24px 0 20px; border-bottom:1px solid var(--line); padding-bottom:14px; display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 16px; }
  .section-title-area h3 { font-family: var(--serif); font-size:22px; margin-bottom:4px; }
  .view-controls { display: flex; gap: 6px; }
  .view-btn {
    background: var(--card); border: 1px solid var(--line); padding: 6px 12px; font-size: 12px;
    border-radius: 6px; font-weight: 500; color: var(--ink-soft); transition: all .15s ease;
  }
  .view-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  /* TWO-TIER FILTER */
  .filter-main { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px; width: 100%; }
  .filter-main .ftag {
    font-family: var(--mono); font-size:12.5px; padding:8px 16px; border-radius:999px;
    border:1px solid var(--ink); color: var(--ink); background:var(--card); font-weight:700; cursor: pointer;
  }
  .filter-main .ftag.active { background: var(--ink); color: var(--paper); }

  .filter-sub { display:flex; gap:7px; flex-wrap:wrap; width: 100%; }
  .filter-sub .ftag {
    font-family: var(--mono); font-size:11px; padding:5px 12px; border-radius:999px;
    border:1px solid var(--line); color: var(--ink-soft); background:var(--card); cursor: pointer;
  }
  .filter-sub .ftag.active { background: var(--gold); color: var(--ink); border-color: var(--gold); font-weight:700; }

  /* GRID VIEW LAYOUT */
  .grid { display:grid; grid-template-columns: repeat(3, 1fr); gap: 24px; padding: 22px 0 60px; }
  @media (max-width: 860px){ .grid{ grid-template-columns: repeat(2,1fr);} }
  @media (max-width: 580px){ .grid{ grid-template-columns: 1fr;} }

  .grid .card {
    background: var(--card); border:1px solid var(--line); border-radius:16px; overflow:hidden;
    display:flex; flex-direction:column; cursor:pointer; transition: transform .15s ease, box-shadow .15s ease;
  }
  .grid .card:hover { transform: translateY(-4px); box-shadow: 0 16px 30px -18px rgba(0,0,0,.35); }
  .grid .card-visual { height: 150px; display:flex; align-items:center; justify-content:center; font-size:48px; position:relative; }
  .grid .card-badge {
    position:absolute; top:10px; right:10px; background: var(--card); border:1px solid var(--line);
    font-family: var(--mono); font-size:10px; font-weight:700; padding:4px 8px; border-radius:999px; color: var(--ink);
  }
  .grid .card-body { padding: 16px 18px 20px; flex:1; display:flex; flex-direction:column; }
  .grid .card-cat { font-family: var(--mono); font-size:11px; color: var(--coral); margin-bottom:8px; }
  .grid .card-title { font-family: var(--serif); font-weight:700; font-size:17px; line-height:1.4; margin-bottom:8px; }
  .grid .card-desc { font-size:13px; color: var(--ink-soft); flex:1; }

  /* LIST VIEW LAYOUT */
  .grid.list-mode { grid-template-columns: 1fr; gap: 10px; padding: 12px 0 40px; }
  .grid.list-mode .card {
    flex-direction: row; align-items: center; padding: 12px 20px; background: var(--card);
    border: 1px solid var(--line); border-radius: 10px; gap: 16px;
  }
  .grid.list-mode .card:hover { transform: none; border-color: var(--gold); box-shadow: none; }
  .grid.list-mode .card-visual { height: 40px; width: 40px; min-width: 40px; font-size: 24px; background: none !important; }
  .grid.list-mode .card-badge { display: none; }
  .grid.list-mode .card-body { padding: 0; flex-direction: row; align-items: center; justify-content: space-between; width: 100%; gap: 16px; }
  .grid.list-mode .card-title-group { flex: 1; }
  .grid.list-mode .card-cat { display: none; }
  .grid.list-mode .card-title { font-size: 15px; margin-bottom: 2px; }
  .grid.list-mode .card-desc { font-size: 12.5px; color: var(--ink-soft); }
  .grid.list-mode .card-meta-right { font-family: var(--mono); font-size: 12px; color: var(--ink-soft); white-space: nowrap; }

  .empty { text-align:center; padding: 60px 20px; color: var(--ink-soft); }
  .empty .icon { font-size:40px; margin-bottom:12px; }

  /* MODALS & RESTRUCTURED DETAIL */
  .overlay { position:fixed; inset:0; background: rgba(28,27,25,0.5); display:none; align-items:center; justify-content:center; z-index:100; padding:20px; }
  .overlay.show { display:flex; }
  .modal {
    background: var(--paper); border-radius:20px; max-width: 720px; width:100%;
    max-height: 88vh; overflow-y:auto; padding: 40px;
  }
  .modal-close { float:right; background:none; border:none; font-size:20px; color: var(--ink-soft); }
  .modal h3 { font-family: var(--serif); font-size:24px; margin-bottom: 22px; clear:both; }
  
  .detail-cat { font-family: var(--mono); font-size: 13px; color: var(--coral); letter-spacing: .05em; margin-bottom: 12px; }
  .detail-title { font-family: var(--serif); font-size: 32px; font-weight: 700; line-height: 1.35; margin-bottom: 16px; color: var(--ink); }
  .detail-meta { font-family: var(--mono); font-size: 12px; color: var(--ink-soft); margin-bottom: 28px; padding-bottom: 16px; border-bottom: 1px solid var(--line); }
  
  .detail-body { font-family: var(--sans); font-size: 16px; line-height: 1.75; color: #2C2A29; }
  .detail-body p { margin-bottom: 20px; }
  .detail-body h4 { font-family: var(--serif); font-size: 19px; font-weight: 700; margin: 32px 0 12px; color: var(--green); }
  .detail-body ul, .detail-body ol { margin: 12px 0 20px 20px; }
  .detail-body li { margin-bottom: 8px; }
  .detail-body strong { color: var(--ink); font-weight: 700; }
  .detail-summary-box { background: var(--green-soft); border-left: 4px solid var(--green); padding: 18px 20px; border-radius: 4px 12px 12px 4px; margin-bottom: 28px; font-size: 15px; color: #1F5C4A; line-height: 1.65; }

  /* FIELDS & TOAST */
  .field { margin-bottom:16px; }
  .field label { display:block; font-size:12.5px; font-weight:700; margin-bottom:6px; color: var(--ink); }
  .field input, .field select, .field textarea { width:100%; padding:11px 14px; border:1px solid var(--line); border-radius:10px; font-family: var(--sans); font-size:14px; background: var(--card); }
  .field textarea { min-height: 160px; resize: vertical; line-height:1.6; }
  .submit-btn { width:100%; background: var(--green); color:#fff; border:none; padding:14px; border-radius:999px; font-weight:700; font-size:15px; margin-top:6px; }
  
  footer { text-align:center; padding: 30px 0 60px; color: var(--ink-soft); font-size:12.5px; }
  .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--ink); color: var(--paper); padding: 12px 22px; border-radius:999px; font-size:13.5px; transition: transform .25s ease; z-index: 200; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* QUIZ STYLES */
  .quiz-eyebrow { font-family: var(--mono); font-size:11.5px; color: var(--coral); margin-bottom:6px; }
  .quiz-q { margin-bottom: 24px; }
  .quiz-q .q-text { font-family: var(--serif); font-size:16px; margin-bottom:12px; }
  .quiz-opt { display:block; width:100%; text-align:left; padding: 12px 16px; margin-bottom:8px; border:1.5px solid var(--line); border-radius:12px; background: var(--card); font-size:13.5px; }
  .quiz-opt:hover { border-color: var(--gold); }
  .quiz-result { text-align:center; }
  .quiz-result .badge { display:inline-block; font-family: var(--mono); font-size:12px; padding:6px 14px; border-radius:999px; margin-bottom:14px; font-weight:700; }
  .quiz-result .badge.low { background:#E4EEE9; color: var(--green); }
  .quiz-result .badge.mid { background:#FBF1DD; color:#95701F; }
  .quiz-result .badge.high { background:#FDECE9; color: var(--coral); }
  .quiz-result h4 { font-family: var(--serif); font-size:22px; margin-bottom:14px; }
  .quiz-result p { font-size:14.5px; color: var(--ink); text-align:left; line-height:1.7; margin-bottom:18px; }
  .quiz-disclaimer { background: var(--paper); border:1px dashed var(--line); border-radius:12px; padding:16px; font-size:12.5px; color: var(--ink-soft); text-align:left; line-height:1.7; }
  .quiz-restart { margin-top:16px; background:none; border:1.5px solid var(--ink); color:var(--ink); padding:10px 20px; border-radius:999px; font-weight:700; font-size:13px; }
  .quiz-mode-select { display:flex; flex-direction:column; gap:12px; }
  .quiz-mode-card { text-align:left; padding: 18px 20px; border:1.5px solid var(--line); border-radius:14px; background: var(--card); }
  .quiz-mode-card:hover { border-color: var(--gold); }
  .quiz-mode-card .mode-title { font-family: var(--serif); font-size:16px; font-weight:700; margin-bottom:4px; }
  .quiz-mode-card .mode-desc { font-size:12.5px; color: var(--ink-soft); }
  .axis-row { margin-bottom: 16px; text-align:left; }
  .axis-row .axis-label { display:flex; justify-content:space-between; font-size:13px; font-weight:700; margin-bottom:4px; }
  .axis-dots { font-family: var(--mono); font-size:16px; color: var(--gold); letter-spacing:2px; }
  .allocation-box { background: var(--green-soft); border-radius:12px; padding:16px; margin: 18px 0; text-align:left; }
  .allocation-box .alloc-title { font-family: var(--mono); font-size:11px; color: var(--green); font-weight:700; margin-bottom:8px; }
  .allocation-box .alloc-value { font-family: var(--serif); font-size:15px; line-height:1.6; }
  .insight-box { background: var(--paper); border:1px solid var(--line); border-radius:12px; padding:14px 16px; margin-bottom:16px; text-align:left; font-size:13px; line-height:1.7; }

  @media (prefers-reduced-motion: reduce) { .card, .toast { transition:none; } }
</style>
</head>
<body>

<div class="masthead">
  <div class="wrap masthead-top">
    <span class="masthead-issue">2026 · VOL. <span id="issue-num">01</span></span>
    <span class="masthead-issue">개인·기업 통합 재정 저널</span>
  </div>
  <div class="masthead-title">찐머니</div>
  <div class="masthead-sub">JJINMONEY — 수입과 지출, 세금부터 고급 자산 구조화까지 아우르는 정밀 지침서</div>
  <div class="masthead-nav">
    <a href="#featured">이번 호</a>
    <a href="#archive">아카이브</a>
    <a href="#" onclick="openQuiz();return false;">성향진단</a>
  </div>
</div>

<div class="wrap">
  <section class="featured" id="featured">
    <div class="eyebrow">// EDITOR'S PICK</div>
    <div class="issue-highlight" id="issue-highlight"></div>
    <div class="issue-recent-head">최근 발행</div>
    <div class="issue-recent" id="issue-recent"></div>
  </section>

  <!-- TARGET SEPARATE TABS -->
  <div class="target-tabs">
    <button class="target-tab active" id="tab-personal" onclick="setTargetTab('personal')">🏛️ 개인 금융 자산</button>
    <button class="target-tab" id="tab-corporate" onclick="setTargetTab('corporate')">🏢 법인 기업 세무</button>
  </div>

  <div class="section-head" id="archive">
    <div class="section-title-area">
      <h3>프리미엄 지침 아카이브</h3>
    </div>
    <div class="view-controls">
      <button class="view-btn active" id="btn-grid" onclick="setViewMode('grid')">㗊 바둑판식</button>
      <button class="view-btn" id="btn-list" onclick="setViewMode('list')">☰ 리스트식</button>
    </div>
    <div class="filter-main" id="filter-main"></div>
    <div class="filter-sub" id="filter-sub"></div>
  </div>

  <div class="grid" id="grid"></div>

  <footer>© 2026 찐머니 매거진</footer>
</div>

<button class="add-btn" onclick="openAddModal()">✎ 새 가이드 올리기</button>

<!-- ADD MODAL -->
<div class="overlay" id="add-overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeAddModal()">✕</button>
    <h3>새 가이드 올리기</h3>
    <div class="field">
      <label>대상 대분류</label>
      <select id="f-target" onchange="onTargetTabChangeInModal()">
        <option value="personal">개인 금융 자산 (Personal)</option>
        <option value="corporate">법인 기업 세무 (Corporate)</option>
      </select>
    </div>
    <div class="field">
      <label>카테고리</label>
      <select id="f-category" onchange="onMainCategoryChange()"></select>
    </div>
    <div class="field">
      <label>소분류</label>
      <select id="f-subcategory"></select>
    </div>
    <div class="field">
      <label>제목</label>
      <input id="f-title" placeholder="예: 파킹통장 및 CMA 금리 비교">
    </div>
    <div class="field">
      <label>한 줄 요약</label>
      <input id="f-desc" placeholder="카드에 보일 짧은 설명 (30자 내외)">
    </div>
    <div class="field">
      <label>대표 이모지</label>
      <input id="f-emoji" placeholder="💵" maxlength="2">
    </div>
    <div class="field">
      <label>본문 (문단은 줄바꿈 두 번으로 구분)</label>
      <textarea id="f-body" placeholder="내용을 입력하십시오."></textarea>
    </div>
    <button class="submit-btn" id="submit-btn" onclick="submitArticle()">가이드 저장하기</button>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="overlay" id="detail-overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeDetailModal()">✕</button>
    <div id="detail-content"></div>
  </div>
</div>

<!-- QUIZ MODAL -->
<div class="overlay" id="quiz-overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeQuiz()">✕</button>
    <div class="quiz-eyebrow">// 찐머니 성향진단</div>
    <h3>나는 저위험? 중위험? 고위험?</h3>
    <div id="quiz-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== 카테고리 구조 =====
const TABS_MAP = {
  personal: {
    "수익 늘리기": ["저난이도", "중난이도", "고난이도"],
    "비용 줄이기": ["고정비", "변동비"],
    "절세": ["기본", "심화"],
    "세금 관리": ["이자소득", "배당소득", "사업소득", "근로소득", "연금소득", "기타소득"]
  },
  corporate: {
    "세금 관리": ["법인소득", "부가세", "가지급금"],
    "자산 구조화": ["법인전환", "배당정책", "가업승계"]
  }
};

const CAT_EMOJI = { "수익 늘리기":"💵", "비용 줄이기":"📉", "절세":"🧾", "세금 관리":"🏛️", "자산 구조화": "🏢" };
const CAT_COLOR = { "수익 늘리기":"#E4EEE9", "비용 줄이기":"#FDECE9", "절세":"#FBF1DD", "세금 관리":"#E4EEE9", "자산 구조화":"#E4EEE9" };

// ===== 시드 데이터 =====
const SEED = [
  { id:"c1", target:"corporate", category:"세금 관리", subcategory:"법인소득", title:"법인 CEO를 위한 배당 정책 수정 가이드", desc:"분기배정 및 개정 세법 분리과세 연동 연출", emoji:"🏢",

    body:"【서민 주거 세제】\n주민등록등본상 전입신고가 완료된 근로자의 경우, 소득 기준에 따라 개인이 1년간 납부한 총 월세 지출액의 최대 15%~17%를 연말정산 시 세금에서 직접 돌려받을 수 있습니다.\n\n제목:1. 수치 시뮬레이션 (매월 월세 60만 원, 연 720만 원 지출 시)\n- Case A. 총급여액 5,500만 원 이하 근로자\n최고 공제율 17% 적용. 720만 원 × 17% = 122만 4,000원 환급.\n최종 연말정산 통장 입금 현금액: 122만 4,000원 (약 두 달 치 월세 확보 효과).\n\n- Case B. 총급여액 5,500만 원 초과 7,000만 원 이하 근로자\n기본 공제율 15% 적용. 720만 원 × 15% = 108만 원 환급.\n최종 연말정산 통장 입금 현금액: 108만 원.\n\n※ 실질 절세 실익: 연말정산 세액 환급을 확보함으로써 연간 거주 비용을 확정적으로 크게 삭감하는 자산 리스크 제로 수준의 확정 재크 성과를 거두게 됩니다.\n\n제목:2. 현장 실사례 부연\n20대 사회초년생 I씨는 임대인이 원룸은 월세 공제가 안 되며 신청 시 불이익을 주겠다고 압박하여 3년간 신청을 누락했습니다. 본 저널의 지침을 통해 임대인 동의가 불필요하다는 사실과 5년 내 소급 환급이 가능한 '경정청구' 제도를 파악했습니다. 이사 직후 과거 3년 치 이체내역서로 경정청구를 접수하여 누락되었던 과거 공제 세액 총 280만 원을 한 번에 일시 환급받았습니다.", date:"2026.07.09" },

    body:"【예수금 자산화】\n유휴 대기 자금을 이율이 거의 없는 일반 수시입출금 계좌에 방치하지 않고 구조와 안정성 조건에 맞춰 적격 매칭을 수행해야 합니다.\n\n제목:1. 수치 시뮬레이션 (예치 자금 5,000만 원, 90일 보관 시)\n- Case 1. CMA (RP형) — 연 금리 3.1% 국공채 담보형.\n세후 최종 실수령 이자: 323,334원.\n- Case 2. 증권사 발행어음 (수시형) — 연 금리 3.4% 초대형사 신용 약정.\n세후 최종 실수령 이자: 354,625원.\n- Case 3. 종금사 IMA 계좌 — 연 금리 3.55% 예금자보호 5,000만 원 한도 성립 특형.\n세후 최종 실수령 이자: 370,270원.\n- Case 4. MMF 펀드 — 연 기대수익률 3.3% 단기 채권형 시가 변동 구조.\n세후 최종 실수령 이자: 344,194원.\n\n※ 실질 금융 이익: 일반 은행 통장 방치 시의 세후 이자(약 10,000원 선) 대비 최대 36만 원 상당의 유의미한 현금 흐름 격차를 아무런 자산 손실 위험 없이 단 3개월 만에 창출해 낼 수 있습니다.\n\n제목:2. 현장 실사례 부연\n프리랜서 M씨는 가을 스튜디오 계약 자금 4,000만 원을 4개월간 보관해야 했습니다. 예금 만기 제약이 답답하던 차에 자금을 분산하여 2,000만 원은 완벽히 예금자보호가 작동하는 IMA 계좌에 예치하고 나머지 2,000만 원은 실시간 입출금이 자유로운 CMA 발행어음형에 거치했습니다. 계약 당일 스마트폰 앱으로 수수료 없이 즉시 인출해 잔금을 치렀음은 물론 보관 기간 쌓인 세후 이자 약 45만 원으로 작업실 전용 가전을 마련했습니다.", date:"2026.07.08" },

  { id:"s16_mod", target:"personal", category:"수익 늘리기", subcategory:"중난이도", title:"ELB와 DLB의 원금보장형 구조 해부 및 예적금 금리 돌파 전략", desc:"사채형 파생결합상품의 손실 구조 제로화 검증 및 옵션 획득", emoji:"🛡️",
    body:"【안전 자산 파생】\n원금 손실 구간이 존재하는 ELS/DLS와 달리, ELB와 DLB는 발행 증권사가 자본시장법상 원금 지급을 100% 책임지는 원금보장형 사채 구조입니다.\n\n제목:1. 수치 시뮬레이션 (투자 원금 2,000만 원, 만기 1년 기준)\n- 일반 시중은행 정기예금 (연 3.4% 확정형): 만기 세후 최종 이자 57만 5,280원 고정 수령.\n- KOSPI 200 연동 디지털 Knock-out형 ELB: 주가 대폭락 시에도 약정에 의거 최저 보장 금리 연 2.0% 확보 (세후 33만 8,400원 보장). 지수가 1년 만기 시점까지 0~15% 내에서 완만하게 상승하여 마감 시 [기본 2.0% + 상승분의 80%] 지급 최고 조건 달성. 지수 10% 상승 시 최종 약정 금리 연 10.0% 정산 집행.\n★ 세후 실수령 이자: 169만 2,000원 수령.\n\n※ 실질 금융 이익: 자산의 안정성을 국가 신용도 수준의 증권사 채권으로 담보하면서 지수 연동 옵션 달성에 성공할 경우 일반 정기예금 대비 약 111만 원 이상의 순수 금융 소득을 단 1년 만에 추가 확보합니다.\n\n제목:2. 현장 실사례 부연\n맞벌이 직장인 부부 O씨는 주택 청약 자금 4,000만 원의 예금 만기가 도래했으나 낮아진 예금 금리에 실망했습니다. 지침을 확인한 뒤 대형사 공모 청약을 통해 달러 환율 변동 밴드를 기초자산으로 하는 원금보장형 DLB에 특판 가입했습니다. 환율이 약정 영역 내 안정적으로 머무르며 연 5.8% 고금리 수령 조건이 성립되었고, 일반 예금 대비 세후 약 80만 원의 보너스 자금을 온전히 쥐게 되었습니다.", date:"2026.07.07" },

  { id:"s17_mod", target:"personal", category:"수익 늘리기", subcategory:"중난이도", title:"펀드의 유형별 클래스(Class) 수수료 해부 및 숨겨진 비용 절감 가이드", desc:"A, C, e, S 클래스별 장기 판매보수 편차 파싱 공식", emoji:"📊",
    body:"【비용 사각지대】\n펀드 자산 성장을 가로막는 최대 요인은 매일 자산 평가액에서 일할 차감되는 판매 보수입니다. 이름 뒤에 결합하는 알파벳의 구조를 매칭해야 장기 적립 효율이 보존됩니다.\n\n제목:1. 수치 시뮬레이션 (매년 1,000만 원씩 총 3년간 장기 적립식 가입 시)\n- Case A. 일반 은행 창구에서 Class C (선취 무, 고보수형) 가입 시:\n매년 누적 평잔에 1.2%의 높은 판매 보수가 부과되어 3년간 누적 총비용 72만 원 차감.\n- Case B. 창구에서 Class A (선취 1%, 저보수형) 가입 시:\n초기 1% 선취수수료 부담 후 연 보수 0.5% 적용으로 3년간 누적 총비용 약 59.7만 원 차감.\n- Case C. 온라인 전용 플랫폼을 통해 Class S (모바일 전용형) 가입 시:\n선취수수료 제로 및 최저 연보수 0.35% 연동 적용으로 3년간 누적 총비용 21만 원 차감.\n\n※ 실질 금융 이익: 단순 추천용 클래스를 배제하고 온라인 전용 S 클래스를 식별해 이식한 결과, 불필요한 고정 수수료를 3년간 총 51만 원 즉시 방어하여 매수 시점부터 연 1.7% 수준의 기대수익률을 먼저 획득하고 진입했습니다.\n\n제목:2. 현장 실사례 부연\n40대 직장인 Q씨는 자녀 학자금용으로 5년 전 은행 창구에서 우량 펀드에 2,000만 원을 거치했습니다. 수익률이 밀리는 원인을 분석한 결과 매년 1.5%씩 빠져나가는 Class C의 판매보수 독소 조항을 식별했습니다. 즉시 환매 후 모바일 전용 저비용 연금 전용 온라인 클래스로 리밸런싱을 감행하여 매년 지출되던 보수를 연간 24만 원씩 원천 세무 절감하는 체질 개선에 성공했습니다.", date:"2026.07.06" },

  { id:"s18_mod", target:"personal", category:"수익 늘리기", subcategory:"중난이도", title:"채권 투자의 기본 매커니즘과 표면금리 vs 실질수익률 매칭 가이드", desc:"장내 할인채 매매차익 비과세 혜택과 실질 YTM 산출법", emoji:"📈",
    body:"【확정부채권 금융】\n모바일 장내 채권 시장을 활용하면 표면금리는 낮으나 채권 가격 자체의 할인 효과로 인해 시중 정기예금의 실질 성과를 크게 상회하는 세후 아웃풋을 달성할 수 있습니다.\n\n제목:1. 수치 시뮬레이션 (투자 자금 1,000만 원, 만기 1년 비교)\n- 시중은행 1년 정기예금 (연 3.5%): 세전 이자 35만 원에서 이자소득세 15.4%를 원천징수한 세후 29만 6,100원 순수익 수령.\n- 표면금리 1.0%짜리 만기 1년 남은 할인 장내 국고채 매수 (현재가 9,650원 거래, 세전 YTM 4.65%):\n① 과세 부과 대상은 오직 표면금리(1%)에만 한정되므로 연간 이자 세금은 단 1만 5,400원만 징수당함 (세후 이자 8만 4,600원 확정).\n② 만기 원금 상환(10,000원) 시 발생하는 단가 차액 35만 원의 매매차익은 현행 소득세법상 개인 100% 비과세 처리 적용.\n★ 최종 세후 수령 총액: 43만 4,600원 수령.\n\n※ 실질 금융 이익: 표면금리가 낮고 가격이 깨진 할인채를 장내 매입해 보유한 결과, 일반 정기예금 대비 연간 13만 8,500원의 최종 세후 이익을 더 확보했습니다. 이는 세전 연 5.13%짜리 일반 은행 예금에 가입한 실익과 동일합니다.\n\n제목:2. 현장 실사례 부연\n사회초년생 R씨는 예적금 위주 자산 형성에 한계를 느꼈습니다. 가이드라인에 따라 주식 대신 장내 시장에서 과거 저금리 시절 발행되어 단가가 9,400원선까지 하락해 있던 대기업 회사채를 500만 원어치 매입했습니다. 만기 도래 시 표면이자에 대한 세금은 최소화한 반면, 만기 원금 상환에 따른 매매차익 30만 원을 비과세로 수령하여 종합소득세 과세표준 상승을 방어하며 재정 포인트를 굳건히 구축했습니다.", date:"2026.07.05" },

    const list = await window.storage.list('article:');
    if (list && list.keys && list.keys.length) {
      const results = await Promise.all(list.keys.map(k => window.storage.get(k).catch(()=>null)));
      stored = results.filter(Boolean).map(r => JSON.parse(r.value));
    }
  } catch (e) {
    console.error('불러오기 실패', e);
  }
  articles = [...stored, ...SEED].sort((a,b) => (b.date || '').localeCompare(a.date || ''));
  updateCategorySelectsForModal();
  render();
}

function setTargetTab(target) {
  activeTarget = target;
  activeMain = "전체";
  activeSub = "전체";
  
  document.getElementById('tab-personal').classList.toggle('active', target === 'personal');

function setViewMode(mode) {

function render() {
  const targetFiltered = articles.filter(a => (a.target || 'personal') === activeTarget);

  const highlight = targetFiltered[0];

  if (highlight) {
    hEl.innerHTML = `
      <span class="issue-badge">최신 지침</span>

      <div class="featured-body">
        <div class="eyebrow">${highlight.category} · ${highlight.subcategory || ''}</div>
        <h2>${escapeHtml(highlight.title)}</h2>
        <p>${escapeHtml(highlight.desc || '')}</p>

      </div>`;
  } else {
    hEl.innerHTML = `<div class="empty" style="grid-column:1/-1">발행된 콘텐츠가 없습니다.</div>`;
  }

  const recentEl = document.getElementById('issue-recent');

  recentEl.innerHTML = recent.map(a => `
    <div class="issue-recent-card" onclick="openDetail('${a.id}')">
      <div class="cat">${a.category} · ${a.date || ''}</div>
      <div class="title">${escapeHtml(a.title)}</div>
    </div>
  `).join('');

  const fm = document.getElementById('filter-main');
  const currentCats = Object.keys(TABS_MAP[activeTarget]);
  const mains = ["전체", ...currentCats];
  fm.innerHTML = mains.map(c => `<span class="ftag ${c===activeMain?'active':''}" onclick="setMainFilter('${c}')">${c}</span>`).join('');

  const fs = document.getElementById('filter-sub');
  if (activeMain === "전체") {
    fs.innerHTML = '';
  } else {
    const subs = ["전체", ...TABS_MAP[activeTarget][activeMain]];
    fs.innerHTML = subs.map(s => `<span class="ftag ${s===activeSub?'active':''}" onclick="setSubFilter('${s}')">${s}</span>`).join('');
  }

  renderGrid();
}

function renderGrid() {
  let list = articles.filter(a => (a.target || 'personal') === activeTarget);
  if (activeMain !== "전체") list = list.filter(a => a.category === activeMain);
  if (activeMain !== "전체" && activeSub !== "전체") list = list.filter(a => a.subcategory === activeSub);

  const grid = document.getElementById('grid');
  grid.className = `grid ${currentViewMode === 'list' ? 'list-mode' : ''}`;

  if (!list.length) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="icon">📭</div>본 카테고리에 등록된 콘텐츠 지침이 존재하지 않습니다.</div>`;
    return;
  }

  if (currentViewMode === 'list') {
    grid.innerHTML = list.map(a => `
      <div class="card" onclick="openDetail('${a.id}')">
        <div class="card-visual">
          ${a.emoji || CAT_EMOJI[a.category] || '🏛️'}
        </div>
        <div class="card-body">
          <div class="card-title-group">
            <div class="card-title">${escapeHtml(a.title)}</div>
            <div class="card-desc">${escapeHtml(a.desc || '')}</div>
          </div>
          <div class="card-meta-right">${a.category} · ${a.date || ''}</div>
        </div>
      </div>
    `).join('');
  } else {
    grid.innerHTML = list.map(a => `
      <div class="card" onclick="openDetail('${a.id}')">
        <div class="card-visual" style="background:${CAT_COLOR[a.category] || '#F1EEE6'}">
          ${a.emoji || CAT_EMOJI[a.category] || '🏛️'}

        </div>
        <div class="card-body">
          <div class="card-cat">${a.category} · ${a.date || ''}</div>
          <div class="card-title">${escapeHtml(a.title)}</div>
          <div class="card-desc">${escapeHtml(a.desc || '')}</div>
        </div>
      </div>
    `).join('');
  }
}

function setMainFilter(c) { activeMain = c; activeSub = "전체"; renderGrid(); }
function setSubFilter(s) { activeSub = s; renderGrid(); }

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

function openAddModal() { 
  document.getElementById('f-target').value = activeTarget;
  updateCategorySelectsForModal();
  document.getElementById('add-overlay').classList.add('show'); 
}
function closeAddModal() { document.getElementById('add-overlay').classList.remove('show'); }

function openDetail(id) {
  const a = articles.find(x => x.id === id);
  if (!a) return;

  let formattedBody = '';
  const paragraphs = (a.body || a.desc || '').split('\n\n');

  paragraphs.forEach(p => {
    let cleanP = p.trim();
    if (!cleanP) return;

    if (cleanP.startsWith('【') || cleanP.startsWith('[')) {
      const closingIdx = cleanP.indexOf('】') !== -1 ? cleanP.indexOf('】') : cleanP.indexOf(']');
      if (closingIdx !== -1) {
        const title = cleanP.slice(1, closingIdx);
        const content = cleanP.slice(closingIdx + 1).trim().replace(/\n/g, '<br>');
        formattedBody += `
          <div class="detail-summary-box">
            <strong>📌 ${title}</strong><br>${content}
          </div>`;
        return;
      }
    }

    if (cleanP.startsWith('제목:') || cleanP.match(/^[0-9]\./) || cleanP.startsWith('※') || cleanP.startsWith('★')) {
      formattedBody += `<h4>${cleanP.replace(/\n/g, '<br>')}</h4>`;
      return;
    }

    if (cleanP.includes('\n- ') || cleanP.match(/\n[0-9]\)/)) {
      const lines = cleanP.split('\n');
      let listHtml = '<ol>';
      let isList = false;

      lines.forEach(line => {
        const trimmedLine = line.trim();
        if (trimmedLine.match(/^[0-9]\)/) || trimmedLine.startsWith('-')) {
          if (!isList) isList = true;
          const content = trimmedLine.replace(/^[0-9]\)/, '').replace(/^-/, '').trim();
          listHtml += `<li>${content}</li>`;
        } else {
          if (isList) { listHtml += '</ol>'; isList = false; }
          listHtml += `<p>${trimmedLine}</p>`;
        }
      });
      if (isList) listHtml += '</ol>';
      formattedBody += listHtml;
      return;
    }

    formattedBody += `<p>${cleanP.replace(/\n/g, '<br>')}</p>`;
  });

  document.getElementById('detail-content').innerHTML = `
    <div class="detail-cat">${a.category} · ${a.subcategory || ''}</div>
    <div class="detail-title">${escapeHtml(a.title)}</div>
    <div class="detail-meta">발행일 지침 고시: ${a.date || ''}</div>
    <div class="detail-body">${formattedBody}</div>
  `;
  document.getElementById('detail-overlay').classList.add('show');
}

function closeDetailModal() { document.getElementById('detail-overlay').classList.remove('show'); }

async function submitArticle() {
  const target = document.getElementById('f-target').value;
  const title = document.getElementById('f-title').value.trim();
  const desc = document.getElementById('f-desc').value.trim();
  const category = document.getElementById('f-category').value;
  const subcategory = document.getElementById('f-subcategory').value;
  const emoji = document.getElementById('f-emoji').value.trim();
  const body = document.getElementById('f-body').value.trim();

  if (!title || !body) {
    showToast('제목과 본문을 성실히 입력해 주십시오.');
    return;
  }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = '지침 엔진 저장 중...';

  const id = 'user_' + Date.now();
  const article = {
    id, target, title, desc, category, subcategory, emoji, body,
    date: new Date().toISOString().slice(0,10).replace(/-/g,'.')
  };

  try {
    const result = await window.storage.set('article:' + id, JSON.stringify(article));
    if (!result) throw new Error('저장 실패');
    document.getElementById('f-title').value = '';
    document.getElementById('f-desc').value = '';
    document.getElementById('f-emoji').value = '';
    document.getElementById('f-body').value = '';
    closeAddModal();
    showToast('새 금융 지침이 성공적으로 아카이브에 인입되었습니다.');
    await loadArticles();
  } catch (e) {
    console.error(e);
    showToast('저장 장치 오류. 다시 이행하십시오.');
  } finally {
    btn.disabled = false; btn.textContent = '가이드 저장하기';
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

  { axis:"stability", text:"Q7. 현재 소득의 안정성을 어떻게 평가하십니까?", options:[{ label:"불안정한 편이다 (프리랜서, 사업 초기 등)", score:0 }, { label:"보통 수준이다", score:1 }, { label:"안정적이다 (정규직 등)", score:2 }]},
  { axis:"experience", text:"Q8. 주식, 펀드 등 위험자산에 대한 투자 경험은 어느 정도이십니까?", options:[{ label:"투자 경험이 없다", score:0 }, { label:"1~3년 정도의 경험이 있다", score:1 }, { label:"3년 이상의 경험이 있다", score:2 }]},
  { axis:"experience", text:"Q9. ELS, 파생결합상품 등 구조화 금융상품의 구조를 이해하고 계십니까?", options:[{ label:"잘 알지 못한다", score:0 }, { label:"기본적인 구조는 이해하고 있다", score:1 }, { label:"상세한 구조까지 이해하고 있다", score:2 }]}
];

const QUIZ_QUESTIONS = [FULL_QUESTIONS[0], FULL_QUESTIONS[3], FULL_QUESTIONS[5]];
const QUIZ_RESULTS = {
  low: { badge: "저위험 성향", cls: "low", title: "자산 보전이 최우선되는 안정 추구형", text: "현재로서는 자산을 안전하게 지키는 방어 기조가 중요합니다. 본 저널의 [단기 대기 자금형 상품 가이드] 및 원금보장형 사채인 [ELB/DLB 지침]을 정밀 매칭하는 포트폴리오 구성을 강력히 권장합니다." },
  mid: { badge: "중위험 성향", cls: "mid", title: "완만한 변동과 알파 수익을 추구하는 균형형", text: "일정 수준의 시장 변동폭을 감내하며 예금 금리 이상의 성과를 노릴 수 있는 유형입니다. 비용을 대폭 낮춘 [온라인 저보수형 클래스 펀드]나 [장내 할인채 채권 비과세 투자 기법]의 연동이 적합합니다." },
  high: { badge: "고위험 성향", cls: "high", title: "변동성을 활용해 초과 수익을 도출하는 적극투자형", text: "위험을 정면으로 통제할 준비가 된 유형입니다. 일시적 충격을 주는 배당락의 매커니즘을 역이용하는 [분기 배당주 최적화 전략]과 2026년 개정 세법의 핵심인 [고배당기업 주주 분리과세 특례]를 통한 세무 방어가 필수 연계 경로입니다." }
};

const AXIS_META = { loss:{ label:"손실 감내도", max:6 }, horizon:{ label:"투자 기간", max:4 }, stability:{ label:"재정 안정성", max:4 }, experience:{ label:"투자 경험", max:4 } };
const ALLOCATION_BY_GRADE = { low:"예금성 자산 70% · 원금보장형 ELB/DLB 20% · 채권혼합형 10%", mid:"예금성 자산 40% · 장내 비과세 할인채 30% · 적립식 S클래스 펀드 30%", high:"분기 우량 배당주 60% · 하이브리드 우회 연금계좌 20% · 유동성 IMA/CMA 20%" };

let quizMode = null; let quizAnswers = []; let quizStep = 0;

function openQuiz() { quizMode = null; document.getElementById('quiz-overlay').classList.add('show'); renderModeSelect(); }
function closeQuiz() { document.getElementById('quiz-overlay').classList.remove('show'); }
function renderModeSelect() {
  document.getElementById('quiz-body').innerHTML = `
    <div class="quiz-mode-select">
      <button class="quiz-mode-card" onclick="startQuiz('quick')">
        <div class="mode-title">요약 진단 (3문항)</div>
        <div class="mode-desc">간략한 응답으로 저·중·고위험 성향을 신속히 식별합니다.</div>
      </button>
      <button class="quiz-mode-card" onclick="startQuiz('full')">
        <div class="mode-title">정밀 진단 (9문항)</div>
        <div class="mode-desc">4개 축(손실감내·기간·안정성·경험)을 정밀 정량화하여 오차 없는 맞춤 자산배분 모델을 도출합니다.</div>
      </button>
    </div>`;
}
function startQuiz(mode) { quizMode = mode; quizAnswers = []; quizStep = 0; renderQuizStep(); }
function renderQuizStep() {
  const body = document.getElementById('quiz-body');
  const questions = quizMode === 'full' ? FULL_QUESTIONS : QUIZ_QUESTIONS;
  if (quizStep >= questions.length) {
    if (quizMode === 'full') renderFullQuizResult(); else renderQuizResult();
    return;
  }
  const q = questions[quizStep];
  body.innerHTML = `
    <div class="quiz-q">
      <div class="q-text">${q.text}</div>
      ${q.options.map((o,i) => `<button class="quiz-opt" onclick="answerQuiz(${i})">${o.label}</button>`).join('')}
    </div>
    <div style="font-family:var(--mono);font-size:11px;color:var(--ink-soft)">PROGRESS: ${quizStep+1} / ${questions.length}</div>`;
}
function answerQuiz(optionIndex) {
  const questions = quizMode === 'full' ? FULL_QUESTIONS : QUIZ_QUESTIONS;
  const q = questions[quizStep];
  quizAnswers.push({ axis: q.axis, score: q.options[optionIndex].score });
  quizStep++;
  renderQuizStep();
}
function renderQuizResult() {
  const total = quizAnswers.reduce((a,b)=>a+b.score, 0);
  let key = 'low'; if (total >= 4) key = 'high'; else if (total >= 2) key = 'mid';
  const r = QUIZ_RESULTS[key];
  document.getElementById('quiz-body').innerHTML = `
    <div class="quiz-result">
      <span class="badge ${r.cls}">${r.badge}</span>
      <h4>${r.title}</h4><p>${r.text}</p>
      <div class="quiz-disclaimer"><b>본 진단 소견은 정량 통계에 근거한 참고 지표이며 확정적 투자 종용이 아닙니다.</b></div>
      <button class="quiz-restart" onclick="openQuiz()">처음으로</button>
    </div>`;
}
function renderFullQuizResult() {
  const axisTotals = { loss:0, horizon:0, stability:0, experience:0 };
  quizAnswers.forEach(a => { axisTotals[a.axis] += a.score; });
  const grandTotal = Object.values(axisTotals).reduce((a,b)=>a+b, 0);
  let key = 'low'; if (grandTotal >= 13) key = 'high'; else if (grandTotal >= 7) key = 'mid';
  const r = QUIZ_RESULTS[key];

  const axisRows = Object.keys(AXIS_META).map(k => {
    const meta = AXIS_META[k];
    const dots = Math.round(axisTotals[k] / meta.max * 5);
    const dotStr = "●".repeat(dots) + "○".repeat(5 - dots);
    return `<div class="axis-row"><div class="axis-label"><span>${meta.label}</span><span class="axis-dots">${dotStr}</span></div></div>`;
  }).join('');

  document.getElementById('quiz-body').innerHTML = `
    <div class="quiz-result">
      <span class="badge ${r.cls}">${r.badge}</span>
      <h4>${r.title}</h4><p>${r.text}</p>
      ${axisRows}
      <div class="allocation-box">
        <div class="alloc-title">// 진단 성향 맞춤 최적 자산배분 모델 안</div>
        <div class="alloc-value">${ALLOCATION_BY_GRADE[key]}</div>
      </div>
      <button class="quiz-restart" onclick="openQuiz()">처음으로</button>
    </div>`;
}
