<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>찐머니 매거진</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&family=EB+Garamond:ital,wght@0,500;1,500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #F7F4EC;
    --card: #FFFDF8;
    --ink: #17140F;
    --ink-soft: #6E6656;
    --gold: #A6813C;
    --gold-deep: #7C611F;
    --gold-soft: #F1E7CF;
    --burgundy: #5C2430;
    --burgundy-soft: #F2E4E3;
    --line: #E4DAC1;
    --serif: 'Noto Serif KR', serif;
    --sans: 'Noto Sans KR', sans-serif;
    --mono: 'Space Mono', monospace;
    --num: 'EB Garamond', serif;
  }
  * { box-sizing: border-box; margin:0; padding:0; }
  body { background: var(--paper); color: var(--ink); font-family: var(--sans); line-height:1.7; -webkit-font-smoothing:antialiased; }
  body.modal-open { overflow: hidden; }
  a { color:inherit; text-decoration:none; }
  button { font-family: var(--sans); cursor:pointer; }

  .masthead { background: var(--ink); color: var(--paper); padding: 30px 0 20px; border-bottom: 3px double var(--gold); }
  .masthead-inner { max-width: 1200px; margin: 0 auto; padding: 0 28px; }
  .masthead-top { display:flex; justify-content:space-between; align-items:baseline; }
  .masthead-issue { font-family: var(--num); font-style:italic; font-size:14px; color: var(--gold); letter-spacing:.04em; }
  .masthead-title { font-family: var(--serif); font-weight:500; font-size:42px; text-align:center; margin: 10px 0 6px; letter-spacing:.14em; }
  .masthead-sub { text-align:center; font-size:12.5px; color: #C9C0A8; font-family: var(--sans); letter-spacing:.08em; }
  .masthead-nav { display:flex; justify-content:center; gap:34px; margin-top:20px; font-size:12.5px; font-weight:500; letter-spacing:.05em; }
  .masthead-nav a { padding-bottom:5px; border-bottom:1px solid transparent; color:#E8E2CF; }
  .masthead-nav a:hover { border-color: var(--gold); color: var(--gold); }

  .page-shell { display:flex; gap:40px; max-width: 1200px; margin: 0 auto; padding: 0 28px; align-items:flex-start; }
  .toc-sidebar { width:230px; flex-shrink:0; position:sticky; top:24px; padding-top:32px; }
  .toc-title { font-family: var(--num); font-style:italic; font-size:13px; color:var(--gold-deep); letter-spacing:.06em; margin-bottom:14px; }
  .toc-group { border-bottom:1px solid var(--line); }
  .toc-cat-btn { width:100%; text-align:left; background:none; border:none; padding:11px 2px; font-family:var(--serif); font-size:14px; font-weight:500; letter-spacing:.02em; display:flex; justify-content:space-between; align-items:center; color:var(--ink); }
  .toc-cat-btn .chev { font-size:10px; color:var(--gold); transition:transform .15s ease; }
  .toc-cat-btn.open .chev { transform:rotate(180deg); }
  .toc-subs { max-height:0; overflow:hidden; transition:max-height .2s ease; display:flex; flex-direction:column; }
  .toc-subs.open { max-height:400px; padding-bottom:10px; }
  .toc-subs a { font-size:12px; color:var(--ink-soft); padding:6px 2px 6px 14px; border-left:1px solid var(--line); cursor:pointer; letter-spacing:.02em; }
  .toc-subs a:hover, .toc-subs a.active { color:var(--gold-deep); border-left-color:var(--gold); font-weight:700; }
  @media (max-width: 900px){ .page-shell{ flex-direction:column; } .toc-sidebar{ width:100%; position:static; padding-top:0; } }

  .main-col { flex:1; min-width:0; padding-top:32px; }

  .top-search-container { margin: 0 0 24px; position: relative; }
  .top-search-input { width:100%; padding:14px 40px 14px 20px; border:1px solid var(--ink); border-radius:2px; font-size:14px; font-family:var(--sans); background:var(--card); letter-spacing:.02em; }
  .top-search-input:focus { outline:none; border-color: var(--gold); }
  .top-search-clear { position:absolute; right:16px; top:50%; transform:translateY(-50%); background:none; border:none; font-size:15px; color:var(--ink-soft); display:none; }

  .eyebrow { font-family: var(--num); font-style:italic; font-size:13.5px; color: var(--burgundy); letter-spacing:.04em; margin-bottom:12px; }

  .issue-highlight { position:relative; display:grid; grid-template-columns: 1fr 1.2fr; gap:36px; align-items:center; background: var(--card); border:1px solid var(--line); border-top:3px double var(--gold); border-radius:2px; overflow:hidden; }
  @media (max-width: 700px){ .issue-highlight{ grid-template-columns:1fr; } }
  .issue-badge { position:absolute; top:18px; left:18px; z-index:2; background: var(--ink); color: var(--gold); font-family: var(--num); font-style:italic; font-size:12px; padding:5px 14px; letter-spacing:.05em; }
  .featured-visual { height:260px; display:flex; align-items:center; justify-content:center; font-size:80px; background: var(--gold-soft); }
  .featured-body { padding: 14px 34px 14px 0; }
  @media (max-width: 700px){ .featured-body{ padding: 0 26px 30px; } }
  .featured-body h2 { font-family: var(--serif); font-weight:500; font-size:24px; line-height:1.5; margin-bottom:12px; letter-spacing:.01em; }
  .featured-body p { color: var(--ink-soft); font-size:14px; margin-bottom:18px; }
  .tip-badge { display:inline-flex; align-items:center; gap:6px; font-family:var(--num); font-style:italic; font-size:13.5px; color: var(--gold-deep); border-bottom:1px solid var(--gold); padding-bottom:2px; cursor:pointer; }

  .issue-list-head { font-family: var(--num); font-style:italic; font-size:13px; color: var(--ink-soft); letter-spacing:.05em; margin: 30px 0 14px; }
  .issue-list { display:grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--line); border:1px solid var(--line); margin-bottom: 18px; }
  @media (max-width: 760px){ .issue-list{ grid-template-columns: repeat(2,1fr);} }
  @media (max-width: 480px){ .issue-list{ grid-template-columns: 1fr;} }
  .issue-list-card { background: var(--card); padding:15px 17px; cursor:pointer; transition: background .15s ease; }
  .issue-list-card:hover { background: var(--gold-soft); }
  .issue-list-card .cat { font-family: var(--num); font-style:italic; font-size:11px; color: var(--burgundy); margin-bottom:6px; }
  .issue-list-card .title { font-family: var(--serif); font-size:13.5px; line-height:1.5; font-weight:500; }

  .target-tabs { display:flex; gap:0; border-bottom:1px solid var(--ink); margin-top:40px; flex-wrap:wrap; }
  .target-tab { padding:12px 22px; font-family: var(--serif); font-size:14px; font-weight:500; background:none; border:none; color: var(--ink-soft); position:relative; letter-spacing:.03em; }
  .target-tab.active { color: var(--ink); }
  .target-tab.active::after { content:''; position:absolute; bottom:-1px; left:0; right:0; height:2px; background: var(--gold); }

  .section-head { margin: 24px 0 20px; border-bottom:1px solid var(--line); padding-bottom:16px; display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:14px; }
  .section-head h3 { font-family: var(--serif); font-weight:500; font-size:19px; letter-spacing:.03em; }
  .view-controls { display:flex; gap:6px; }
  .view-btn { background: var(--card); border:1px solid var(--line); padding:6px 14px; font-size:11.5px; color: var(--ink-soft); letter-spacing:.03em; }
  .view-btn.active { background: var(--ink); color: var(--gold); border-color: var(--ink); }

  .filter-main { display:flex; gap:8px; flex-wrap:wrap; width:100%; margin-bottom:8px; }
  .filter-main .ftag { font-family: var(--sans); font-size:12px; padding:7px 15px; border:1px solid var(--ink); color: var(--ink); background:var(--card); font-weight:500; letter-spacing:.02em; }
  .filter-main .ftag.active { background: var(--ink); color: var(--gold); }
  .filter-sub { display:flex; gap:7px; flex-wrap:wrap; width:100%; }
  .filter-sub .ftag { font-family: var(--sans); font-size:11px; padding:5px 13px; border:1px solid var(--line); color: var(--ink-soft); background:var(--card); }
  .filter-sub .ftag.active { background: var(--gold); color: var(--card); border-color: var(--gold); font-weight:700; }

  .grid { display:grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background:var(--line); border:1px solid var(--line); padding: 0; margin: 8px 0 60px; }
  @media (max-width: 860px){ .grid{ grid-template-columns: repeat(2,1fr);} }
  @media (max-width: 580px){ .grid{ grid-template-columns: 1fr;} }
  .card { background: var(--card); overflow:hidden; display:flex; flex-direction:column; cursor:pointer; transition: background .15s ease; }
  .card:hover { background: var(--gold-soft); }
  .card-visual { height:118px; display:flex; align-items:center; justify-content:center; font-size:38px; position:relative; background: var(--paper); }
  .card-badge { position:absolute; top:10px; right:10px; background: var(--card); border:1px solid var(--line); font-family: var(--num); font-style:italic; font-size:10.5px; padding:3px 9px; color:var(--gold-deep); }
  .card-body { padding: 16px 18px 20px; flex:1; display:flex; flex-direction:column; }
  .card-cat { font-family: var(--num); font-style:italic; font-size:11px; color: var(--burgundy); margin-bottom:8px; }
  .card-title { font-family: var(--serif); font-weight:500; font-size:15px; line-height:1.55; margin-bottom:8px; letter-spacing:.01em; }
  .card-desc { font-size:12.5px; color: var(--ink-soft); flex:1; }

  .grid.list-mode { grid-template-columns: 1fr; gap:1px; }
  .grid.list-mode .card { flex-direction:row; align-items:center; padding:13px 20px; gap:14px; }
  .grid.list-mode .card:hover { background: var(--gold-soft); }
  .grid.list-mode .card-visual { height:34px; width:34px; min-width:34px; font-size:18px; background:none !important; }
  .grid.list-mode .card-badge { display:none; }
  .grid.list-mode .card-body { padding:0; flex-direction:row; align-items:center; justify-content:space-between; width:100%; gap:14px; }
  .grid.list-mode .card-cat { display:none; }
  .grid.list-mode .card-title { font-size:13.5px; margin-bottom:2px; }

  .empty { text-align:center; padding: 54px 20px; color: var(--ink-soft); grid-column: 1/-1; background: var(--card); }
  .empty .icon { font-size:34px; margin-bottom:10px; opacity:.6; }

  .overlay { position:fixed; inset:0; background: rgba(23,20,15,0.55); display:none; align-items:center; justify-content:center; z-index:100; padding:20px; }
  .overlay.show { display:flex; }
  .modal { background: var(--paper); border-top:3px double var(--gold); max-width: 680px; width:100%; max-height: 85vh; overflow-y:auto; padding: 30px 38px 38px; position:relative; }
  .modal-close { position:sticky; top:0; float:right; background: var(--paper); border:none; font-size:20px; color: var(--ink-soft); padding:4px 8px; z-index:5; }
  .modal-close:hover { color: var(--burgundy); }
  .modal h3 { font-family: var(--serif); font-weight:500; font-size:21px; margin-bottom:22px; clear:both; letter-spacing:.02em; }

  .detail-cat { font-family: var(--num); font-style:italic; font-size:13px; color: var(--burgundy); margin-bottom:12px; clear:both; }
  .detail-title { font-family: var(--serif); font-weight:500; font-size:23px; line-height:1.55; margin-bottom:16px; letter-spacing:.01em; }
  .detail-meta { font-family: var(--num); font-style:italic; font-size:12.5px; color: var(--ink-soft); margin-bottom:24px; padding-bottom:16px; border-bottom:1px solid var(--line); }
  .detail-body { font-size:15px; line-height:1.85; }
  .detail-body p { margin-bottom:17px; }
  .detail-body h4 { font-family: var(--serif); font-weight:600; font-size:15.5px; margin:26px 0 11px; color: var(--gold-deep); letter-spacing:.02em; }
  .detail-nav { display:flex; justify-content:space-between; margin-top:32px; padding-top:20px; border-top:1px solid var(--line); }
  .detail-nav button { background:none; border:1px solid var(--ink); padding:8px 16px; font-size:12px; letter-spacing:.03em; }
  .detail-nav button.primary { background: var(--ink); color: var(--gold); }

  .field { margin-bottom:16px; }
  .field label { display:block; font-size:12px; font-weight:500; margin-bottom:6px; letter-spacing:.02em; }
  .field input, .field select, .field textarea { width:100%; padding:11px 14px; border:1px solid var(--line); font-family: var(--sans); font-size:13.5px; background: var(--card); }
  .field textarea { min-height:150px; resize:vertical; line-height:1.6; }
  .submit-btn { width:100%; background: var(--ink); color: var(--gold); border:none; padding:14px; font-weight:500; font-size:14px; margin-top:6px; letter-spacing:.04em; }

  .add-btn { position:fixed; right:30px; bottom:30px; z-index:50; background: var(--ink); color: var(--gold); border:1px solid var(--gold); padding:14px 22px; font-weight:500; font-size:12.5px; letter-spacing:.03em; box-shadow: 0 14px 32px -12px rgba(0,0,0,.5); }
  .add-btn:hover { background: var(--gold); color: var(--ink); }

  footer { text-align:center; padding: 34px 0 64px; color: var(--ink-soft); font-size:12px; letter-spacing:.03em; }
  .toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(100px); background: var(--ink); color: var(--gold); padding:12px 24px; font-size:13px; transition: transform .25s ease; z-index:200; letter-spacing:.02em; }
  .toast.show { transform:translateX(-50%) translateY(0); }

  .quiz-eyebrow { font-family: var(--num); font-style:italic; font-size:13px; color: var(--burgundy); margin-bottom:8px; }
  .quiz-q .q-text { font-family: var(--serif); font-weight:500; font-size:15.5px; margin-bottom:14px; line-height:1.6; }
  .quiz-opt { display:block; width:100%; text-align:left; padding:13px 16px; margin-bottom:8px; border:1px solid var(--line); background: var(--card); font-size:13px; }
  .quiz-opt:hover { border-color: var(--gold); background: var(--gold-soft); }
  .quiz-result { text-align:center; }
  .quiz-result .badge { display:inline-block; font-family: var(--num); font-style:italic; font-size:13px; padding:6px 16px; margin-bottom:16px; }
  .quiz-result .badge.low { background:var(--gold-soft); color: var(--gold-deep); }
  .quiz-result .badge.mid { background:#F1E7CF; color:#8A6B22; }
  .quiz-result .badge.high { background:var(--burgundy-soft); color: var(--burgundy); }
  .quiz-result h4 { font-family: var(--serif); font-weight:500; font-size:20px; margin-bottom:16px; letter-spacing:.01em; }
  .quiz-result p { font-size:13.5px; text-align:left; line-height:1.8; margin-bottom:18px; }
  .quiz-disclaimer { background: var(--card); border:1px solid var(--line); padding:16px; font-size:11.5px; color: var(--ink-soft); text-align:left; line-height:1.8; }
  .quiz-restart { margin-top:18px; background:none; border:1px solid var(--ink); padding:10px 22px; font-weight:500; font-size:12.5px; letter-spacing:.03em; }
  .quiz-mode-select { display:flex; flex-direction:column; gap:12px; }
  .quiz-mode-card { text-align:left; padding:20px 22px; border:1px solid var(--line); background: var(--card); }
  .quiz-mode-card:hover { border-color: var(--gold); }
  .quiz-mode-card .mode-title { font-family: var(--serif); font-weight:500; font-size:15.5px; margin-bottom:5px; letter-spacing:.02em; }
  .quiz-mode-card .mode-desc { font-size:12px; color: var(--ink-soft); line-height:1.6; }
  .axis-row { margin-bottom:15px; text-align:left; }
  .axis-row .axis-label { display:flex; justify-content:space-between; font-size:12px; font-weight:500; letter-spacing:.02em; }
  .axis-dots { font-family: var(--mono); font-size:14px; color: var(--gold); letter-spacing:2px; }
  .allocation-box { background: var(--gold-soft); padding:16px; margin:18px 0; text-align:left; }
  .allocation-box .alloc-title { font-family: var(--num); font-style:italic; font-size:12px; color: var(--gold-deep); margin-bottom:8px; }
  .allocation-box .alloc-value { font-family: var(--serif); font-size:14px; line-height:1.7; }
  .insight-box { background: var(--card); border:1px solid var(--line); padding:14px 16px; margin-bottom:15px; text-align:left; font-size:12px; line-height:1.8; }

  @media (prefers-reduced-motion: reduce) { .card, .toast { transition:none; } }
</style>
</head>
<body>

<div class="masthead">
  <div class="masthead-inner">
    <div class="masthead-top">
      <span class="masthead-issue">MMXXVI · Vol. <span id="issue-num">01</span></span>
      <span class="masthead-issue">개인 재정 관리 저널</span>
    </div>
    <div class="masthead-title">찐 머 니</div>
    <div class="masthead-sub">JJINMONEY — 수입과 지출, 세금까지 아우르는 재정 관리 지침서</div>
    <div class="masthead-nav">
      <a href="#featured">이번 호</a>
      <a href="#archive">아카이브</a>
      <a href="#" onclick="openQuiz();return false;">성향진단</a>
    </div>
  </div>
</div>

<div class="page-shell">
  <aside class="toc-sidebar">
    <div class="toc-title">Contents</div>
    <div id="toc-container"></div>
  </aside>

  <div class="main-col">
    <div class="top-search-container">
      <input type="text" id="search-input" class="top-search-input" placeholder="키워드로 검색" oninput="handleSearch(this.value)">
      <button id="search-clear" class="top-search-clear" onclick="clearSearch()">✕</button>
    </div>

    <section id="featured">
      <div class="eyebrow">Editor's Pick</div>
      <div class="issue-highlight" id="issue-highlight"></div>
      <div class="issue-list-head">발행 목록</div>
      <div class="issue-list" id="issue-list"></div>
    </section>

    <div class="target-tabs">
      <button class="target-tab active" id="tab-employee" onclick="setTargetTab('employee')">직장인</button>
      <button class="target-tab" id="tab-freelancer" onclick="setTargetTab('freelancer')">프리랜서</button>
      <button class="target-tab" id="tab-corporate" onclick="setTargetTab('corporate')">법인 대표</button>
    </div>

    <div class="section-head" id="archive">
      <h3>아카이브</h3>
      <div class="view-controls">
        <button class="view-btn active" id="btn-grid" onclick="setViewMode('grid')">바둑판</button>
        <button class="view-btn" id="btn-list" onclick="setViewMode('list')">리스트</button>
      </div>
      <div class="filter-main" id="filter-main"></div>
      <div class="filter-sub" id="filter-sub"></div>
    </div>

    <div class="grid" id="grid"></div>
    <footer>© MMXXVI 찐머니 매거진</footer>
  </div>
</div>

<button class="add-btn" onclick="openAddModal()">✎ 새 가이드 올리기</button>

<div class="overlay" id="add-overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeAddModal()">✕</button>
    <h3>새 가이드 올리기</h3>
    <div class="field">
      <label>대상</label>
      <select id="f-target" onchange="updateCategorySelectsForModal()">
        <option value="employee">직장인</option>
        <option value="freelancer">프리랜서</option>
        <option value="corporate">법인 대표</option>
      </select>
    </div>
    <div class="field">
      <label>카테고리</label>
      <select id="f-category" onchange="onMainCategoryChange()"></select>
    </div>
    <div class="field">
      <label>소분류</label>
      <select id="f-subcategory"></select>
    </div>
    <div class="field"><label>제목</label><input id="f-title"></div>
    <div class="field"><label>한 줄 요약</label><input id="f-desc"></div>
    <div class="field"><label>대표 이모지</label><input id="f-emoji" maxlength="2"></div>
    <div class="field"><label>본문</label><textarea id="f-body" placeholder="내용을 입력하십시오."></textarea></div>
    <button class="submit-btn" id="submit-btn" onclick="submitArticle()">가이드 저장하기</button>
  </div>
</div>

<div class="overlay" id="detail-overlay">
  <div class="modal" id="detail-modal">
    <button class="modal-close" onclick="closeDetailModal()">✕</button>
    <div id="detail-content"></div>
  </div>
</div>

<div class="overlay" id="quiz-overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeQuiz()">✕</button>
    <div class="quiz-eyebrow">찐머니 성향진단</div>
    <h3>나는 저위험? 중위험? 고위험?</h3>
    <div id="quiz-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

const TABS_MAP = {
  employee: {
    "수익 늘리기": ["부수입", "투자"],
    "비용 줄이기": ["고정비", "변동비"],
    "절세": ["기본", "심화"],
    "세금 관리": ["이자소득", "배당소득", "근로소득", "연금소득", "기타소득"]
  },
  freelancer: { "세금 관리": ["사업소득"] },
  corporate: { "자산 구조화": ["법인전환"] }
};

const CAT_EMOJI = { "수익 늘리기":"💵", "비용 줄이기":"📉", "절세":"🧾", "세금 관리":"🏛️", "자산 구조화":"🏢" };

let articles = [];
let activeTarget = "employee";
let activeMain = "전체";
let activeSub = "전체";
let currentViewMode = "grid";
let searchQuery = "";

async function loadArticles() {
  let stored = [];
  try {
    const list = await window.storage.list('article:');
    if (list && list.keys && list.keys.length) {
      const results = await Promise.all(list.keys.map(k => window.storage.get(k).catch(()=>null)));
      stored = results.filter(Boolean).map(r => JSON.parse(r.value));
    }
  } catch (e) { console.error('불러오기 실패', e); }
  articles = [...stored, ...SEED].sort((a,b) => (b.date || '').localeCompare(a.date || ''));
  updateCategorySelectsForModal();
  render();
}

function currentTargetArticles() {
  let list = articles.filter(a => (a.target || 'employee') === activeTarget);
  if (searchQuery) {
    list = list.filter(a =>
      a.title.toLowerCase().includes(searchQuery) ||
      (a.desc && a.desc.toLowerCase().includes(searchQuery)) ||
      (a.body && a.body.toLowerCase().includes(searchQuery))
    );
  }
  return list;
}

function setTargetTab(target) {
  activeTarget = target;
  activeMain = "전체";
  activeSub = "전체";
  document.getElementById('tab-employee').classList.toggle('active', target === 'employee');
  document.getElementById('tab-freelancer').classList.toggle('active', target === 'freelancer');
  document.getElementById('tab-corporate').classList.toggle('active', target === 'corporate');
  render();
}

function setViewMode(mode) {
  currentViewMode = mode;
  document.getElementById('btn-grid').classList.toggle('active', mode === 'grid');
  document.getElementById('btn-list').classList.toggle('active', mode === 'list');
  render();
}

function handleSearch(val) {
  searchQuery = val.trim().toLowerCase();
  document.getElementById('search-clear').style.display = searchQuery ? 'block' : 'none';
  render();
}
function clearSearch() {
  document.getElementById('search-input').value = "";
  searchQuery = "";
  document.getElementById('search-clear').style.display = 'none';
  render();
}

function updateCategorySelectsForModal() {
  const modalTarget = document.getElementById('f-target').value;
  const mainSel = document.getElementById('f-category');
  mainSel.innerHTML = Object.keys(TABS_MAP[modalTarget]).map(c => `<option>${c}</option>`).join('');
  onMainCategoryChange();
}
function onMainCategoryChange() {
  const modalTarget = document.getElementById('f-target').value;
  const main = document.getElementById('f-category').value;
  const subs = TABS_MAP[modalTarget][main] || [];
  document.getElementById('f-subcategory').innerHTML = subs.map(s => `<option>${s}</option>`).join('');
}

let tocOpenGroups = {};
function renderTOC() {
  const cats = TABS_MAP[activeTarget];
  const container = document.getElementById('toc-container');
  container.innerHTML = Object.keys(cats).map(cat => {
    const isOpen = tocOpenGroups[cat] || false;
    const subs = cats[cat];
    return `
      <div class="toc-group">
        <button class="toc-cat-btn ${isOpen?'open':''}" onclick="toggleTocGroup('${cat}')">
          <span>${cat}</span><span class="chev">▾</span>
        </button>
        <div class="toc-subs ${isOpen?'open':''}">
          ${subs.map(s => `<a class="${activeMain===cat && activeSub===s ? 'active':''}" onclick="jumpFilter('${cat}','${s}')">${s}</a>`).join('')}
        </div>
      </div>`;
  }).join('');
}
function toggleTocGroup(cat) { tocOpenGroups[cat] = !tocOpenGroups[cat]; renderTOC(); }
function jumpFilter(main, sub) {
  activeMain = main; activeSub = sub; tocOpenGroups[main] = true;
  render();
  document.getElementById('archive').scrollIntoView({ behavior: 'smooth' });
}

function render() {
  document.getElementById('issue-num').textContent = String(articles.length).padStart(2,'0');
  const list = currentTargetArticles();

  const highlight = list[0];
  const hEl = document.getElementById('issue-highlight');
  if (highlight) {
    hEl.innerHTML = `
      <span class="issue-badge">최신 발행</span>
      <div class="featured-visual">${highlight.emoji || '📝'}</div>
      <div class="featured-body">
        <div class="eyebrow">${highlight.category} · ${highlight.subcategory || ''}</div>
        <h2>${escapeHtml(highlight.title)}</h2>
        <p>${escapeHtml(highlight.desc || '')}</p>
        <span class="tip-badge" onclick="openDetail('${highlight.id}')">자세히 보기 →</span>
      </div>`;
  } else {
    hEl.innerHTML = `<div class="empty"><div class="icon">🔍</div>검색 결과가 없습니다.</div>`;
  }

  const restList = list.slice(1);
  document.getElementById('issue-list').innerHTML = restList.map(a => `
    <div class="issue-list-card" onclick="openDetail('${a.id}')">
      <div class="cat">${a.category} · ${a.subcategory || ''}</div>
      <div class="title">${escapeHtml(a.title)}</div>
    </div>
  `).join('') || `<div class="empty" style="grid-column:1/-1; padding:20px;">추가 발행물이 없습니다.</div>`;

  const fm = document.getElementById('filter-main');
  const mains = ["전체", ...Object.keys(TABS_MAP[activeTarget])];
  fm.innerHTML = mains.map(c => `<span class="ftag ${c===activeMain?'active':''}" onclick="setMainFilter('${c}')">${c}</span>`).join('');

  const fs = document.getElementById('filter-sub');
  if (activeMain === "전체") { fs.innerHTML = ''; }
  else {
    const subs = ["전체", ...(TABS_MAP[activeTarget][activeMain] || [])];
    fs.innerHTML = subs.map(s => `<span class="ftag ${s===activeSub?'active':''}" onclick="setSubFilter('${s}')">${s}</span>`).join('');
  }

  renderTOC();
  renderGrid();
}

function renderGrid() {
  let list = currentTargetArticles();
  if (activeMain !== "전체") list = list.filter(a => a.category === activeMain);
  if (activeMain !== "전체" && activeSub !== "전체") list = list.filter(a => a.subcategory === activeSub);

  const grid = document.getElementById('grid');
  grid.className = `grid ${currentViewMode === 'list' ? 'list-mode' : ''}`;

  if (!list.length) {
    grid.innerHTML = `<div class="empty"><div class="icon">📭</div>해당 조건에 등록된 콘텐츠가 없습니다.</div>`;
    return;
  }
  grid.innerHTML = list.map(a => `
    <div class="card" onclick="openDetail('${a.id}')">
      <div class="card-visual">
        ${a.emoji || CAT_EMOJI[a.category] || '📝'}
        <span class="card-badge">${a.subcategory || a.category}</span>
      </div>
      <div class="card-body">
        <div class="card-cat">${a.category} · ${a.date || ''}</div>
        <div class="card-title">${escapeHtml(a.title)}</div>
        <div class="card-desc">${escapeHtml(a.desc || '')}</div>
      </div>
    </div>
  `).join('');
}

function setMainFilter(c) { activeMain = c; activeSub = "전체"; render(); }
function setSubFilter(s) { activeSub = s; render(); }
function escapeHtml(str) { const d = document.createElement('div'); d.textContent = str || ''; return d.innerHTML; }

function openAddModal() { document.getElementById('add-overlay').classList.add('show'); document.body.classList.add('modal-open'); }
function closeAddModal() { document.getElementById('add-overlay').classList.remove('show'); document.body.classList.remove('modal-open'); }

function openDetail(id) {
  let currentList = currentTargetArticles();
  if (activeMain !== "전체") currentList = currentList.filter(a => a.category === activeMain);
  if (activeMain !== "전체" && activeSub !== "전체") currentList = currentList.filter(a => a.subcategory === activeSub);

  const idx = currentList.findIndex(x => x.id === id);
  const a = articles.find(x => x.id === id);
  if (!a) return;

  let formattedBody = '';
  (a.body || '').split('\n').forEach(p => {
    const t = p.trim();
    if (!t) return;
    if (t.startsWith('【') || t.startsWith('※') || t.startsWith('1)') || t.startsWith('-')) {
      formattedBody += `<h4>${escapeHtml(t)}</h4>`;
    } else {
      formattedBody += `<p>${escapeHtml(t)}</p>`;
    }
  });

  let nav = `<div class="detail-nav">`;
  if (idx > 0) nav += `<button onclick="openDetail('${currentList[idx-1].id}')">← 이전</button>`;
  else nav += `<span></span>`;
  if (idx >= 0 && idx < currentList.length - 1) nav += `<button class="primary" onclick="openDetail('${currentList[idx+1].id}')">다음 →</button>`;
  else nav += `<span></span>`;
  nav += `</div>`;

  document.getElementById('detail-content').innerHTML = `
    <div class="detail-cat">${a.category} · ${a.subcategory || ''} · ${TARGET_LABEL[a.target] || ''}</div>
    <div class="detail-title">${escapeHtml(a.title)}</div>
    <div class="detail-meta">${a.date || ''}</div>
    <div class="detail-body">${formattedBody}</div>
    ${nav}
  `;
  document.getElementById('detail-overlay').classList.add('show');
  document.body.classList.add('modal-open');
  document.getElementById('detail-modal').scrollTop = 0;
}
function closeDetailModal() { document.getElementById('detail-overlay').classList.remove('show'); document.body.classList.remove('modal-open'); }

async function submitArticle() {
  const target = document.getElementById('f-target').value;
  const title = document.getElementById('f-title').value.trim();
  const desc = document.getElementById('f-desc').value.trim();
  const category = document.getElementById('f-category').value;
  const subcategory = document.getElementById('f-subcategory').value;
  const emoji = document.getElementById('f-emoji').value.trim();
  const body = document.getElementById('f-body').value.trim();

  if (!title || !body) { showToast('제목과 본문을 입력해 주십시오'); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = '저장 중...';

  const id = 'user_' + Date.now();
  const article = { id, target, title, desc, category, subcategory, emoji, body, date: new Date().toISOString().slice(0,10).replace(/-/g,'.') };

  try {
    const result = await window.storage.set('article:' + id, JSON.stringify(article));
    if (!result) throw new Error('저장 실패');
    document.getElementById('f-title').value = '';
    document.getElementById('f-desc').value = '';
    document.getElementById('f-emoji').value = '';
    document.getElementById('f-body').value = '';
    closeAddModal();
    showToast('가이드가 저장되었습니다');
    await loadArticles();
  } catch (e) {
    console.error(e);
    showToast('저장에 실패했습니다. 다시 시도해 주십시오');
  } finally {
    btn.disabled = false; btn.textContent = '가이드 저장하기';
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

document.addEventListener("DOMContentLoaded", function() {
  document.getElementById("detail-overlay").addEventListener("click", e => { if (e.target === e.currentTarget) closeDetailModal(); });
  document.getElementById("add-overlay").addEventListener("click", e => { if (e.target === e.currentTarget) closeAddModal(); });
  document.getElementById("quiz-overlay").addEventListener("click", e => { if (e.target === e.currentTarget) closeQuiz(); });
});

loadArticles();

const QUIZ_QUESTIONS = [
  { text:"Q1. 보유 자산의 평가액이 절반으로 감소할 경우, 어떻게 대응하시겠습니까?",
    options:[ {label:"즉시 매도를 고려한다", score:0}, {label:"일정 기간 상황을 지켜본다", score:1}, {label:"추가 매수의 기회로 판단한다", score:2} ] },
  { text:"Q2. 해당 자금은 언제 사용할 계획이십니까?",
    options:[ {label:"1년 이내 사용할 가능성이 있다", score:0}, {label:"3~5년간은 사용할 계획이 없다", score:1}, {label:"10년 이상 장기 보유가 가능하다", score:2} ] },
  { text:"Q3. 현재 생활비 3~6개월분에 해당하는 비상 자금을 보유하고 계십니까?",
    options:[ {label:"보유하고 있지 않거나 부족한 편이다", score:0}, {label:"어느 정도 확보되어 있다", score:1}, {label:"충분히 마련되어 있다", score:2} ] },
];

const QUIZ_RESULTS = {
  low: { badge:"저위험 성향", cls:"low", title:"자산 보전이 우선되는 유형",
    text:"현재로서는 자산을 보전하는 전략이 우선되어야 합니다. 예금, 국채, ELB와 같이 원금이 보장되는 상품을 중심으로 포트폴리오를 구성하는 것을 권장합니다. 수익률보다 안정성이 우선되는 국면입니다." },
  mid: { badge:"중위험 성향", cls:"mid", title:"완만한 변동을 감내할 수 있는 유형",
    text:"일정 수준의 변동성을 감내할 여력이 있는 유형입니다. 채권혼합형 펀드나 인컴형 ETF와 같이 원금 변동은 있으나 완만한 상품이 적합하며, 집중 투자보다는 분산 투자가 권장됩니다." },
  high: { badge:"고위험 성향", cls:"high", title:"리스크를 감내할 준비가 된 유형",
    text:"리스크를 감내할 준비가 되어 있는 유형입니다. ELS, 배당주, 리츠와 같은 상품군도 고려 대상에 포함될 수 있습니다. 다만 높은 위험이 반드시 높은 수익을 보장하지는 않는다는 점을 유념하시기 바랍니다." }
};

const FULL_QUESTIONS = [
  { axis:"loss", text:"Q1. 보유 자산의 평가액이 절반으로 감소할 경우, 어떻게 대응하시겠습니까?",
    options:[ {label:"즉시 매도를 고려한다", score:0}, {label:"일정 기간 상황을 지켜본다", score:1}, {label:"추가 매수의 기회로 판단한다", score:2} ] },
  { axis:"loss", text:"Q2. 투자 원금 대비 10% 손실이 발생했을 때, 심리적으로 어떠십니까?",
    options:[ {label:"매우 불안하여 원금 회복만 생각하게 된다", score:0}, {label:"다소 불안하나 계획대로 유지한다", score:1}, {label:"변동성의 일부로 받아들인다", score:2} ] },
  { axis:"loss", text:"Q3. 감내할 수 있는 최대 손실 비율은 어느 정도라고 판단하십니까?",
    options:[ {label:"원금 손실은 감내하기 어렵다", score:0}, {label:"10~20% 내외는 감내할 수 있다", score:1}, {label:"30% 이상도 감내할 수 있다", score:2} ] },
  { axis:"horizon", text:"Q4. 해당 자금은 언제 사용할 계획이십니까?",
    options:[ {label:"1년 이내 사용할 가능성이 있다", score:0}, {label:"3~5년간은 사용할 계획이 없다", score:1}, {label:"10년 이상 장기 보유가 가능하다", score:2} ] },
  { axis:"horizon", text:"Q5. 투자하려는 자금의 성격은 무엇에 가깝습니까?",
    options:[ {label:"단기 생활자금과 일부 중첩된다", score:0}, {label:"중기 목적자금이다", score:1}, {label:"장기 여유자금이다", score:2} ] },
  { axis:"stability", text:"Q6. 생활비 3~6개월분에 해당하는 비상 자금을 보유하고 계십니까?",
    options:[ {label:"보유하고 있지 않다", score:0}, {label:"일부 보유하고 있다", score:1}, {label:"충분히 보유하고 있다", score:2} ] },
  { axis:"stability", text:"Q7. 현재 소득의 안정성을 어떻게 평가하십니까?",
    options:[ {label:"불안정한 편이다", score:0}, {label:"보통 수준이다", score:1}, {label:"안정적이다", score:2} ] },
  { axis:"experience", text:"Q8. 주식, 펀드 등 위험자산에 대한 투자 경험은 어느 정도이십니까?",
    options:[ {label:"투자 경험이 없다", score:0}, {label:"1~3년 정도의 경험이 있다", score:1}, {label:"3년 이상의 경험이 있다", score:2} ] },
  { axis:"experience", text:"Q9. ELS, 파생결합상품 등 구조화 금융상품의 구조를 이해하고 계십니까?",
    options:[ {label:"잘 알지 못한다", score:0}, {label:"기본적인 구조는 이해하고 있다", score:1}, {label:"상세한 구조까지 이해하고 있다", score:2} ] },
];

const AXIS_META = { loss:{label:"손실 감내도",max:6}, horizon:{label:"투자 기간",max:4}, stability:{label:"재정 안정성",max:4}, experience:{label:"투자 경험",max:4} };
const ALLOCATION_BY_GRADE = {
  low:"예금성 자산 70% · 채권혼합형 20% · 주식형 10%",
  mid:"예금성 자산 40% · 채권혼합형 30% · 주식형 30%",
  high:"예금성 자산 20% · 채권혼합형 20% · 주식형 60%",
};

let quizMode = null, quizAnswers = [], quizStep = 0;

function openQuiz() {
  quizMode = null;
  document.getElementById('quiz-overlay').classList.add('show');
  document.body.classList.add('modal-open');
  renderModeSelect();
}
function closeQuiz() { document.getElementById('quiz-overlay').classList.remove('show'); document.body.classList.remove('modal-open'); }

function renderModeSelect() {
  document.getElementById('quiz-body').innerHTML = `
    <div class="quiz-mode-select">
      <button class="quiz-mode-card" onclick="startQuiz('quick')">
        <div class="mode-title">요약 진단 (3문항)</div>
        <div class="mode-desc">간략한 응답으로 저·중·고위험 성향을 빠르게 확인합니다.</div>
      </button>
      <button class="quiz-mode-card" onclick="startQuiz('full')">
        <div class="mode-title">정밀 진단 (9문항)</div>
        <div class="mode-desc">손실 감내도·투자 기간·재정 안정성·투자 경험 4개 축을 세부적으로 측정하고, 참고 자산배분 예시를 함께 제공합니다.</div>
      </button>
    </div>`;
}
function startQuiz(mode) { quizMode = mode; quizAnswers = []; quizStep = 0; renderQuizStep(); }

function renderQuizStep() {
  const questions = quizMode === 'full' ? FULL_QUESTIONS : QUIZ_QUESTIONS;
  if (quizStep >= questions.length) {
    if (quizMode === 'full') renderFullQuizResult(); else renderQuizResult();
    return;
  }
  const q = questions[quizStep];
  document.getElementById('quiz-body').innerHTML = `
    <div class="quiz-q">
      <div class="q-text">${q.text}</div>
      ${q.options.map((o,i) => `<button class="quiz-opt" onclick="answerQuiz(${i})">${o.label}</button>`).join('')}
    </div>
    <div style="font-family:var(--num);font-style:italic;font-size:12px;color:var(--ink-soft)">${quizStep+1} / ${questions.length}</div>`;
}
function answerQuiz(i) {
  const questions = quizMode === 'full' ? FULL_QUESTIONS : QUIZ_QUESTIONS;
  const q = questions[quizStep];
  quizAnswers.push({ axis: q.axis, score: q.options[i].score });
  quizStep++;
  renderQuizStep();
}

function renderQuizResult() {
  const total = quizAnswers.reduce((a,b)=>a+b.score, 0);
  let key = 'low';
  if (total >= 4) key = 'high'; else if (total >= 2) key = 'mid';
  const r = QUIZ_RESULTS[key];
  document.getElementById('quiz-body').innerHTML = `
    <div class="quiz-result">
      <span class="badge ${r.cls}">${r.badge}</span>
      <h4>${r.title}</h4>
      <p>${r.text}</p>
      <div class="quiz-disclaimer"><b>본 진단 결과는 참고 자료이며, 확정적인 투자 권고가 아닙니다.</b><br><br>
      제시된 상품군은 일반적인 특성을 안내하는 것이며, 실제 투자 결정과 그에 따른 책임은 전적으로 투자자 본인에게 있습니다. 상당한 규모의 자산을 운용하기에 앞서 반드시 전문가와의 상담을 거치시기를 권합니다.</div>
      <button class="quiz-restart" onclick="openQuiz()">처음으로</button>
    </div>`;
}

function renderFullQuizResult() {
  const axisTotals = { loss:0, horizon:0, stability:0, experience:0 };
  quizAnswers.forEach(a => { axisTotals[a.axis] += a.score; });
  const grandTotal = Object.values(axisTotals).reduce((a,b)=>a+b, 0);
  let key = 'low';
  if (grandTotal >= 13) key = 'high'; else if (grandTotal >= 7) key = 'mid';
  const r = QUIZ_RESULTS[key];

  const axisRows = Object.keys(AXIS_META).map(k => {
    const meta = AXIS_META[k];
    const dots = Math.round(axisTotals[k] / meta.max * 5);
    return { label: meta.label, dots, dotStr: "●".repeat(dots) + "○".repeat(5-dots) };
  });

  const sorted = [...axisRows].sort((a,b) => b.dots - a.dots);
  let insight = "네 개 축의 측정 결과가 비교적 고르게 분포되어 있어, 종합 등급에 부합하는 일반적인 자산배분 전략을 적용하기에 무리가 없는 유형입니다.";
  if (sorted[0].dots - sorted[sorted.length-1].dots >= 3) {
    insight = `${sorted[0].label}은(는) 높게 측정되었으나 ${sorted[sorted.length-1].label}은(는) 상대적으로 낮게 측정되었습니다. 이러한 경우 종합 등급이 제시하는 상품군보다 다소 보수적인 접근이 안전할 수 있습니다.`;
  }

  document.getElementById('quiz-body').innerHTML = `
    <div class="quiz-result">
      <span class="badge ${r.cls}">${r.badge}</span>
      <h4>${r.title}</h4>
      <p>${r.text}</p>
      ${axisRows.map(row => `<div class="axis-row"><div class="axis-label"><span>${row.label}</span><span class="axis-dots">${row.dotStr}</span></div></div>`).join('')}
      <div class="insight-box">${insight}</div>
      <div class="allocation-box"><div class="alloc-title">참고 자산배분 예시</div><div class="alloc-value">${ALLOCATION_BY_GRADE[key]}</div></div>
      <div class="quiz-disclaimer"><b>본 진단 결과는 참고 자료이며, 확정적인 투자 권고가 아닙니다.</b><br><br>
      제시된 자산배분 예시는 일반적인 성향 분류에 따른 참고 자료이며, 특정 상품이나 종목에 대한 권유가 아닙니다. 실제 자산배분은 개인의 재무 목표, 세제 여건, 시장 상황에 따라 달라질 수 있으므로 정기적인 재조정이 필요합니다. 투자 결정과 그에 따른 책임은 전적으로 투자자 본인에게 있으며, 상당한 규모의 자산을 운용하기에 앞서 반드시 전문가와의 상담을 거치시기를 권합니다.</div>
      <button class="quiz-restart" onclick="openQuiz()">처음으로</button>
    </div>`;
}
</script>
