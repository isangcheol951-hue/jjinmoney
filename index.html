<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>찐머니 매거진</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700;900&family=Noto+Sans+KR:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #FAF8F4;
    --card: #FFFFFF;
    --ink: #1C1B19;
    --ink-soft: #837C70;
    --green: #1F5C4A;
    --green-soft: #E4EEE9;
    --gold: #D9A441;
    --coral: #E2624F;
    --line: #E7E0D3;
    --serif: 'Noto Serif KR', serif;
    --sans: 'Noto Sans KR', sans-serif;
    --mono: 'Space Mono', monospace;
  }
  * { box-sizing: border-box; margin:0; padding:0; }
  body { background: var(--paper); color: var(--ink); font-family: var(--sans); line-height:1.65; -webkit-font-smoothing:antialiased; }
  a { color:inherit; text-decoration:none; }
  .wrap { max-width: 1080px; margin:0 auto; padding: 0 24px; }
  button { font-family: var(--sans); cursor:pointer; }

  /* MASTHEAD */
  .masthead { border-bottom: 2px solid var(--ink); padding: 26px 0 16px; }
  .masthead-top { display:flex; justify-content:space-between; align-items:baseline; }
  .masthead-issue { font-family: var(--mono); font-size:12px; color: var(--ink-soft); letter-spacing:.05em; }
  .masthead-title { font-family: var(--serif); font-weight:900; font-size:44px; text-align:center; margin: 8px 0 4px; letter-spacing:-0.01em; }
  .masthead-sub { text-align:center; font-size:13px; color: var(--ink-soft); font-family: var(--mono); letter-spacing:.04em; }
  .masthead-nav { display:flex; justify-content:center; gap:26px; margin-top:18px; font-size:13px; font-weight:700; }
  .masthead-nav a { padding-bottom:4px; border-bottom:2px solid transparent; }
  .masthead-nav a:hover { border-color: var(--gold); }
  .add-btn {
    position: fixed; right: 28px; bottom: 28px; z-index: 50;
    background: var(--ink); color: var(--paper); border:none;
    padding: 16px 24px; border-radius: 999px; font-weight:700; font-size:14px;
    box-shadow: 0 12px 30px -10px rgba(0,0,0,0.4);
    display:flex; align-items:center; gap:8px;
  }
  .add-btn:hover { background: var(--green); }

  /* FEATURED */
  .featured { padding: 48px 0 20px; }
  .eyebrow { font-family: var(--mono); font-size:12px; color: var(--coral); letter-spacing:.06em; margin-bottom:10px; }
  .featured-card {
    display:grid; grid-template-columns: 1fr 1.2fr; gap: 40px; align-items:center;
    background: var(--card); border:1px solid var(--line); border-radius: 18px; overflow:hidden;
  }
  @media (max-width: 800px){ .featured-card{ grid-template-columns:1fr; } }
  .featured-visual {
    height: 320px; display:flex; align-items:center; justify-content:center; font-size:96px;
    background: linear-gradient(135deg, var(--green-soft), #fff);
  }
  .featured-body { padding: 12px 36px 12px 0; }
  @media (max-width: 800px){ .featured-body{ padding: 0 24px 32px; } }
  .featured-body h2 { font-family: var(--serif); font-size:30px; line-height:1.4; margin-bottom:12px; }
  .featured-body p { color: var(--ink-soft); font-size:14.5px; margin-bottom:18px; }
  .tip-badge {
    display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:12px;
    background: var(--green-soft); color: var(--green); padding:5px 12px; border-radius:999px; font-weight:700;
  }

  /* SECTION HEAD */
  .section-head { margin: 56px 0 20px; border-bottom:1px solid var(--line); padding-bottom:14px; }
  .section-head h3 { font-family: var(--serif); font-size:22px; margin-bottom:16px; }

  /* TWO-TIER FILTER */
  .filter-main { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px; }
  .filter-main .ftag {
    font-family: var(--mono); font-size:12.5px; padding:8px 16px; border-radius:999px;
    border:1px solid var(--ink); color: var(--ink); background:var(--card); font-weight:700;
  }
  .filter-main .ftag.active { background: var(--ink); color: var(--paper); }

  .filter-sub { display:flex; gap:7px; flex-wrap:wrap; }
  .filter-sub .ftag {
    font-family: var(--mono); font-size:11px; padding:5px 12px; border-radius:999px;
    border:1px solid var(--line); color: var(--ink-soft); background:var(--card);
  }
  .filter-sub .ftag.active { background: var(--gold); color: var(--ink); border-color: var(--gold); font-weight:700; }

  /* GRID */
  .grid { display:grid; grid-template-columns: repeat(3, 1fr); gap: 24px; padding: 22px 0 60px; }
  @media (max-width: 860px){ .grid{ grid-template-columns: repeat(2,1fr);} }
  @media (max-width: 580px){ .grid{ grid-template-columns: 1fr;} }

  .card {
    background: var(--card); border:1px solid var(--line); border-radius:16px; overflow:hidden;
    display:flex; flex-direction:column; cursor:pointer; transition: transform .15s ease, box-shadow .15s ease;
  }
  .card:hover { transform: translateY(-4px); box-shadow: 0 16px 30px -18px rgba(0,0,0,.35); }
  .card-visual { height: 150px; display:flex; align-items:center; justify-content:center; font-size:48px; position:relative; }
  .card-badge {
    position:absolute; top:10px; right:10px; background: var(--card); border:1px solid var(--line);
    font-family: var(--mono); font-size:10px; font-weight:700; padding:4px 8px; border-radius:999px; color: var(--ink);
  }
  .card-body { padding: 16px 18px 20px; flex:1; display:flex; flex-direction:column; }
  .card-cat { font-family: var(--mono); font-size:11px; color: var(--coral); margin-bottom:8px; }
  .card-title { font-family: var(--serif); font-weight:700; font-size:17px; line-height:1.4; margin-bottom:8px; }
  .card-desc { font-size:13px; color: var(--ink-soft); flex:1; }
  .card-meta { font-family: var(--mono); font-size:11px; color: var(--ink-soft); margin-top:12px; padding-top:12px; border-top:1px dashed var(--line); }

  .empty { text-align:center; padding: 60px 20px; color: var(--ink-soft); }
  .empty .icon { font-size:40px; margin-bottom:12px; }

  /* MODALS */
  .overlay { position:fixed; inset:0; background: rgba(28,27,25,0.5); display:none; align-items:center; justify-content:center; z-index:100; padding:20px; }
  .overlay.show { display:flex; }
  .modal {
    background: var(--paper); border-radius:20px; max-width: 640px; width:100%;
    max-height: 88vh; overflow-y:auto; padding: 32px;
  }
  .modal-close { float:right; background:none; border:none; font-size:20px; color: var(--ink-soft); }
  .modal h3 { font-family: var(--serif); font-size:24px; margin-bottom: 22px; clear:both; }
  .field { margin-bottom:16px; }
  .field label { display:block; font-size:12.5px; font-weight:700; margin-bottom:6px; color: var(--ink); }
  .field input, .field select, .field textarea {
    width:100%; padding:11px 14px; border:1px solid var(--line); border-radius:10px;
    font-family: var(--sans); font-size:14px; background: var(--card);
  }
  .field textarea { min-height: 160px; resize: vertical; line-height:1.6; }
  .field .hint { font-size:11.5px; color: var(--ink-soft); margin-top:5px; }
  .submit-btn {
    width:100%; background: var(--green); color:#fff; border:none; padding:14px; border-radius:999px;
    font-weight:700; font-size:15px; margin-top:6px;
  }
  .submit-btn:disabled { opacity:0.5; }

  /* DETAIL */
  .detail-cat { font-family: var(--mono); font-size:12px; color: var(--coral); margin-bottom:10px; }
  .detail-title { font-family: var(--serif); font-size:26px; margin-bottom:14px; line-height:1.4; }
  .detail-meta { font-family: var(--mono); font-size:11.5px; color: var(--ink-soft); margin-bottom:22px; }
  .detail-body { font-size:15px; white-space: pre-wrap; }
  .detail-body p { margin-bottom: 14px; }

  footer { text-align:center; padding: 30px 0 60px; color: var(--ink-soft); font-size:12.5px; }

  .toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(100px);
    background: var(--ink); color: var(--paper); padding: 12px 22px; border-radius:999px; font-size:13.5px;
    transition: transform .25s ease; z-index: 200;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* QUIZ */
  .quiz-eyebrow { font-family: var(--mono); font-size:11.5px; color: var(--coral); margin-bottom:6px; }
  .quiz-q { margin-bottom: 24px; }
  .quiz-q .q-text { font-family: var(--serif); font-size:16px; margin-bottom:12px; }
  .quiz-opt {
    display:block; width:100%; text-align:left; padding: 12px 16px; margin-bottom:8px;
    border:1.5px solid var(--line); border-radius:12px; background: var(--card); font-size:13.5px;
  }
  .quiz-opt:hover { border-color: var(--gold); }
  .quiz-opt.selected { border-color: var(--green); background: var(--green-soft); font-weight:700; }
  .quiz-result { text-align:center; }
  .quiz-result .badge {
    display:inline-block; font-family: var(--mono); font-size:12px; padding:6px 14px; border-radius:999px;
    margin-bottom:14px; font-weight:700;
  }
  .quiz-result .badge.low { background:#E4EEE9; color: var(--green); }
  .quiz-result .badge.mid { background:#FBF1DD; color:#95701F; }
  .quiz-result .badge.high { background:#FDECE9; color: var(--coral); }
  .quiz-result h4 { font-family: var(--serif); font-size:22px; margin-bottom:14px; }
  .quiz-result p { font-size:14.5px; color: var(--ink); text-align:left; line-height:1.7; margin-bottom:18px; }
  .quiz-disclaimer {
    background: var(--paper); border:1px dashed var(--line); border-radius:12px; padding:16px;
    font-size:12.5px; color: var(--ink-soft); text-align:left; line-height:1.7;
  }
  .quiz-restart {
    margin-top:16px; background:none; border:1.5px solid var(--ink); color:var(--ink);
    padding:10px 20px; border-radius:999px; font-weight:700; font-size:13px;
  }

  @media (prefers-reduced-motion: reduce) { .card, .toast { transition:none; } }
</style>
</head>
<body>

<div class="masthead">
  <div class="wrap masthead-top">
    <span class="masthead-issue">2026 · VOL. <span id="issue-num">01</span></span>
    <span class="masthead-issue">생활 재테크 매거진</span>
  </div>
  <div class="masthead-title">찐머니</div>
  <div class="masthead-sub">JJINMONEY — 수익은 높게, 비용·세금은 낮게</div>
  <div class="masthead-nav">
    <a href="#featured">이번 호</a>
    <a href="#archive">아카이브</a>
    <a href="#" onclick="openQuiz();return false;">성향진단</a>
  </div>
</div>

<div class="wrap">
  <section class="featured" id="featured">
    <div class="eyebrow">// EDITOR'S PICK</div>
    <div class="featured-card" id="featured-card"></div>
  </section>

  <div class="section-head" id="archive">
    <h3>아카이브</h3>
    <div class="filter-main" id="filter-main"></div>
    <div class="filter-sub" id="filter-sub"></div>
  </div>

  <div class="grid" id="grid"></div>

  <footer>© 2026 찐머니 매거진 · 상철님과 Claude가 함께 만드는 중</footer>
</div>

<button class="add-btn" onclick="openAddModal()">✎ 새 가이드 올리기</button>

<!-- ADD MODAL -->
<div class="overlay" id="add-overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeAddModal()">✕</button>
    <h3>새 가이드 올리기</h3>
    <div class="field">
      <label>대분류</label>
      <select id="f-category" onchange="onMainCategoryChange()"></select>
    </div>
    <div class="field">
      <label>소분류</label>
      <select id="f-subcategory"></select>
    </div>
    <div class="field">
      <label>제목</label>
      <input id="f-title" placeholder="예: ISA 만기 후 IRP로 이전하는 법">
    </div>
    <div class="field">
      <label>한 줄 요약</label>
      <input id="f-desc" placeholder="카드에 보일 짧은 설명 (30자 내외)">
    </div>
    <div class="field">
      <label>대표 이모지</label>
      <input id="f-emoji" placeholder="💵" maxlength="2">
    </div>
    <div class="field">
      <label>본문 (지식을 편하게 던져주세요, 문단은 줄바꿈 두번으로 구분)</label>
      <textarea id="f-body" placeholder="여기에 아는 내용을 편하게 써주세요."></textarea>
      <div class="hint">※ 지금은 원문 그대로 저장돼요. 다듬는 건 다음 단계에서 함께 해요.</div>
    </div>
    <button class="submit-btn" id="submit-btn" onclick="submitArticle()">가이드 저장하기</button>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="overlay" id="detail-overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeDetailModal()">✕</button>
    <div id="detail-content"></div>
  </div>
</div>

<!-- QUIZ MODAL -->
<div class="overlay" id="quiz-overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeQuiz()">✕</button>
    <div class="quiz-eyebrow">// 찐머니 성향진단</div>
    <h3>나는 저위험? 중위험? 고위험?</h3>
    <div id="quiz-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== 카테고리 구조 =====
const CATS = {
  "수익 늘리기": ["저난이도", "중난이도", "고난이도"],
  "비용 줄이기": ["고정비", "변동비"],
  "절세": ["기본", "심화"],
  "세금 관리": ["이자소득", "배당소득", "사업소득", "근로소득", "연금소득", "기타소득"]
};
const CAT_EMOJI = { "수익 늘리기":"💵", "비용 줄이기":"📉", "절세":"🧾", "세금 관리":"🏛️" };
const CAT_COLOR = { "수익 늘리기":"#E4EEE9", "비용 줄이기":"#FDECE9", "절세":"#FBF1DD", "세금 관리":"#E4EEE9" };

// ===== 시드 가이드 =====
const SEED = [
  { id:"s1", category:"비용 줄이기", subcategory:"변동비", title:"첫 월급 받은 사회초년생, 통장 4개로 쪼개는 법", desc:"월급날마다 헷갈리지 않게 자동이체 세팅까지", emoji:"💵",
    body:"월급이 들어오면 가장 먼저 할 일은 통장을 쪼개는 거예요.\n\n1) 월급통장 - 급여만 스치듯 지나가는 곳\n2) 생활비통장 - 고정지출과 변동지출\n3) 저축통장 - 자동이체로 먼저 떼어놓기\n4) 비상금통장 - 손대지 않는 돈\n\n월급날 다음날 자동이체를 걸어두면 신경 쓸 일이 없어져요.", date:"2026.07.01" },
  { id:"s2", category:"비용 줄이기", subcategory:"고정비", title:"매달 새던 5만원, 구독료 다이어트로 찾기", desc:"안 쓰는 구독 서비스 찾아내는 3분 체크리스트", emoji:"✂️",
    body:"구독료는 적은 금액이 여러 개 쌓여서 새는 대표적인 지출이에요.\n\n카드 앱의 정기결제 내역을 한 번에 확인하고, 최근 한 달간 실제로 사용하지 않은 서비스는 과감히 해지하세요.", date:"2026.07.03" },
  { id:"s3", category:"수익 늘리기", subcategory:"저난이도", title:"퇴근 후 30분, 앱테크로 커피값 벌기", desc:"실제로 되는 앱만 골라서 정리했어요", emoji:"📱",
    body:"앱테크는 큰돈은 아니지만 확실한 부수입이에요.\n\n걷기 적립, 리서치 설문, 영수증 리뷰 등 매일 조금씩 쌓이는 구조를 만드는 게 핵심입니다.", date:"2026.07.05" },
  { id:"s4", category:"비용 줄이기", subcategory:"고정비", title:"보험 다시 볼 때 됐다, 실비보험 리모델링법", desc:"중복 보장 빼고 꼭 필요한 것만 남기는 순서", emoji:"🛡️",
    body:"보험은 한 번 가입하면 잘 안 들여다보게 되는데, 1년에 한 번은 점검이 필요해요.\n\n먼저 내가 가진 모든 보험의 보장 내용을 한 곳에 정리하고, 중복되는 항목을 찾아보세요.", date:"2026.07.08" },
  { id:"s5", category:"절세", subcategory:"기본", title:"13월의 월급, 놓치기 쉬운 공제 5가지", desc:"연말정산 전에 딱 5분만 투자하세요", emoji:"🧾",
    body:"연말정산에서 놓치기 쉬운 공제 항목들이 있어요.\n\n월세 세액공제, 중소기업 취업자 소득세 감면, 신용카드·체크카드 사용 비율 조정, 개인연금저축 공제, 의료비 공제까지 미리 챙겨두면 환급액이 달라집니다.", date:"2026.07.10" },
  { id:"s6", category:"비용 줄이기", subcategory:"고정비", title:"자취방 전월세 계약 전 체크리스트 10", desc:"보증금 지키는 서류 확인 순서 정리", emoji:"🏠",
    body:"전월세 계약 전에는 등기부등본부터 확인하세요.\n\n근저당 설정 여부, 실소유주 확인, 확정일자와 전입신고까지 순서대로 챙기면 보증금을 안전하게 지킬 수 있어요.", date:"2026.07.11" },
  { id:"s7", category:"세금 관리", subcategory:"배당소득", title:"배당소득세, 언제 종합과세로 잡히나", desc:"금융소득종합과세 기준선 넘기 전에 알아둘 것", emoji:"📈",
    body:"배당·이자소득 합산 연 2천만원을 넘으면 금융소득종합과세 대상이 돼요.\n\n분리과세(15.4%)로 끝나던 세금이 다른 소득과 합산되면서 세율이 확 뛸 수 있으니, 금융소득이 큰 편이라면 계좌 명의 분산이나 비과세 계좌 활용을 미리 고민해보세요.", date:"2026.07.12" },
  { id:"s8", category:"세금 관리", subcategory:"사업소득", title:"프리랜서 3.3% 원천징수 완벽정리", desc:"매달 떼가는 3.3%, 결국 어떻게 되는 돈일까", emoji:"🧑‍💻",
    body:"프리랜서로 일하면 지급받을 때 3.3%(소득세+지방소득세)가 원천징수돼요.\n\n이건 미리 떼는 세금이라, 다음해 5월 종합소득세 신고할 때 실제 소득에 맞게 정산돼요. 경비 처리를 잘 해두면 환급받는 경우도 많아요.", date:"2026.07.13" },
  { id:"s9", category:"수익 늘리기", subcategory:"중난이도", title:"스마트스토어 시작 전 알아야 할 것들", desc:"사업자등록부터 첫 상품 소싱까지", emoji:"🛒",
    body:"스마트스토어는 진입장벽이 낮은 만큼 경쟁도 치열해요.\n\n사업자등록(간이과세자로 시작 가능), 통신판매업 신고, 초기 소싱처 확보 순서로 준비하면 됩니다. 처음엔 마진보다 검증에 집중하세요.", date:"2026.07.14" },
  { id:"s10", category:"수익 늘리기", subcategory:"고난이도", title:"법인 설립, 언제가 맞는 타이밍일까", desc:"개인사업자와 법인의 세금 구조 차이", emoji:"🏢",
    body:"소득이 일정 수준을 넘으면 법인 전환이 세금 측면에서 유리해질 수 있어요.\n\n법인세율이 종합소득세율보다 낮은 구간이 있고, 대표이사 급여와 배당을 나눠 설계하면 절세 여지가 생겨요. 다만 법인 운영비용과 행정 부담도 같이 고려해야 해요.", date:"2026.07.15" },
  { id:"s11", category:"절세", subcategory:"심화", title:"ISA 만기 후 IRP로 이전하는 절세법", desc:"만기자금 그냥 인출하면 손해예요", emoji:"🔄",
    body:"ISA 만기자금을 IRP나 연금저축으로 이전하면 추가 세액공제 혜택을 받을 수 있어요.\n\n이전 금액의 10%(최대 300만원)까지 추가 공제가 가능해서, 만기 시점에 그냥 인출하기보다 이전을 먼저 고려하는 게 유리해요.", date:"2026.07.16" },

  // ===== 부수입 로드맵: 1단계 (확정 수입) =====
  { id:"s12", category:"수익 늘리기", subcategory:"저난이도", title:"포인트·마일리지 현금화 총정리", desc:"카드사·통신사에 잠자는 돈 깨우는 법", emoji:"💳",
    body:"안 써서 사라지는 돈부터 챙기는 게, 세상에서 제일 쉬운 재테크예요.\n\n【카드 포인트 — 1분이면 현금으로】\n여신금융협회 '카드포인트 통합조회·계좌입금 서비스'(cardpoint.or.kr)를 쓰면 롯데·BC·삼성·신한·우리·하나·현대·KB국민·NH농협·씨티카드까지 흩어진 포인트를 한 번에 조회하고 바로 계좌로 입금 신청할 수 있어요. 환율은 1포인트=1원, 신청 즉시 또는 익영업일에 입금돼요. 매년 소멸되는 카드 포인트가 약 1,000억원 규모라고 하니, 확인 안 하면 그냥 날리는 돈이에요.\n\n※ 항공 마일리지나 OK캐시백 같은 제휴 포인트는 이 서비스 대상이 아니에요. 카드사 대표 포인트만 해당돼요.\n\n【통신사 멤버십 포인트】\nSKT·KT·LG U+ 멤버십은 제휴처 할인으로 쓰는 게 기본이지만, 일부는 통신 요금 결제 충당이나 상품권 전환도 가능해요. 앱 내 '멤버십' 메뉴에서 잔여 포인트와 소멸일부터 확인하세요.\n\n【간편결제 적립금】\n네이버페이·카카오페이·토스 적립금은 현금과 거의 동일하게 쓸 수 있어서 오히려 방치되기 쉬워요. 마이페이지에서 잔액과 소멸 예정일을 확인하는 습관을 들이세요.\n\n【1년에 한 번, 포인트 정리하는 날 만들기】\n가장 현실적인 방법은 캘린더에 고정 일정을 박아두는 거예요. 연말이나 생일처럼 기억하기 쉬운 날짜로 지정하고, 그날 하루 카드 포인트 통합조회+통신사 멤버십+간편결제 적립금 3곳만 훑으세요. 소멸 예정 포인트는 그 자리에서 바로 현금화하면 끝이에요.", date:"2026.07.18" },
  { id:"s13", category:"수익 늘리기", subcategory:"저난이도", title:"중고거래 3종 세트 실전 비교", desc:"당근·번개장터·중고나라, 뭐가 다른가", emoji:"♻️",
    body:"안 쓰는 물건 파는 건 리스크 0에 가까운 제일 확실한 부수입이에요. 근데 플랫폼을 잘못 고르면 시간만 날려요.\n\n【당근마켓 — 동네 기반, 직거래 특화】\n가장 빠른 거래 속도. 가구·가전·유아용품처럼 부피 크고 배송 번거로운 물건에 최적이에요. '매너온도'로 신뢰도가 형성돼서 사기 리스크가 상대적으로 낮아요. 다만 동네 수요에 갇혀서 희소한 물건은 안 팔릴 수 있어요.\n\n【번개장터 — 전국 단위, 희소성 강함】\n한정판 스니커즈, 의류, 굿즈처럼 특정 카테고리 마니아층이 몰려있어요. 전국 배송이 기본이라 판매 범위가 넓고, 검수 서비스로 고가 상품 안전거래도 지원해요. 배송비·수수료가 발생하고, 사진·설명 퀄리티가 판매 속도를 좌우해요.\n\n【중고나라 — 카페 기반, 카테고리 커뮤니티】\n네이버 카페 특성상 전자기기·책·육아용품 등 특정 분야 전문 커뮤니티가 형성돼 있고, 오래된 만큼 이용자 풀이 넓어요. 다만 사기 이슈가 상대적으로 많이 보도되니 직거래·안전결제 확인이 필수예요.\n\n【판매 잘 되는 공통 팁】\n1) 사진이 8할 — 자연광에서, 흠집은 숨기지 말고 같이 찍기\n2) 가격은 네고 여지 살짝 남기기 — 시세보다 5~10% 높게 시작\n3) 설명에 구매 시기·사용 빈도 명시 — 신뢰가 곧 판매 속도\n\n【안전거래 원칙】\n고가 물건은 직거래+공공장소, 또는 플랫폼 안전결제 활용. 계좌이체 먼저 요구하면 특히 조심하고, 택배거래는 반드시 플랫폼 제공 안전결제로 하세요.", date:"2026.07.19" },
  { id:"s14", category:"수익 늘리기", subcategory:"저난이도", title:"리워드 앱 현실 정산 — 진짜 얼마 벌 수 있나", desc:"캐시워크·토스 만보기 등 실제 지급 구조 검증", emoji:"🚶",
    body:"'이걸로 월급만큼 번다'는 광고는 걸러 들으세요. 대신 커피값 정도는 확실하게 나와요.\n\n【캐시워크】\n국내 만보기 앱 중 독보적 1위, 일일 활성 사용자(DAU) 560만 명 규모예요. 매일 최대 1만보를 걸으면 총 100캐시(=100원)를 받을 수 있고, 100보마다 뜨는 보물상자를 직접 눌러야 적립돼요. 매일 꾸준히 모으면 한 달에 3,000원 정도이고, 돈버는 퀴즈를 맞히면 문제당 5~15캐시가 추가돼요.\n\n【토스 만보기】\n별도 설치 없이 토스 앱에서 바로 쓸 수 있어서 진입장벽이 제일 낮아요. 1000보에 10원, 5000보에서 추가 10원, 1만보에서 추가 20원이 적립되고, 지정 장소 방문 시 20원(최대 100원)이 더 붙어요. 매일 확실하게 챙길 수 있는 금액은 하루 900원대 수준이에요.\n\n【현실적인 기대치】\n인터넷에 '앱테크로 월 70만원 벌었다'는 글도 있는데, 대부분 과장된 광고성 콘텐츠예요. 여러 앱을 꾸준히 병행해본 실제 후기를 보면 월 평균 몇천원 수준이 현실적이에요.\n\n정리하면: 하루 10~15분 투자해서 월 3천~1만원 사이. 소박하지만 리스크가 0이고 걷는 습관까지 따라온다는 점에서 '안 할 이유가 없는' 부수입이에요.\n\n【실전 팁】\n1) 1~2개만 골라서 꾸준히 — 여러 개 설치하면 배터리만 닳아요\n2) 자정 초기화 주의 — 그날 안 받으면 리셋되니 알림 켜두기\n3) '월 몇십만원' 광고는 광고 수익 유도용이라고 생각하세요", date:"2026.07.20" },
  { id:"s15", category:"수익 늘리기", subcategory:"저난이도", title:"은행 앱테크 이벤트 상시 체크리스트", desc:"신규가입·자동이체 이벤트, 놓치면 손해", emoji:"🏦",
    body:"은행들이 신규 고객 유치를 위해 뿌리는 이벤트는 안 챙기면 그냥 손해인 확정 수입이에요.\n\n【왜 챙겨야 하나】\n은행마다 신규가입·급여이체·자동이체 등록 시 현금성 혜택을 주는데, 분기 시작 시기(3·6·9·12월)에 신규 고객 유치 목표가 걸리면서 평소보다 혜택이 크게 풀리는 경향이 있어요.\n\n【실전 체크리스트】\n1) 주거래은행 갈아타기 타이밍 노리기 — 급여이체 100만원 이상, 카드결제 30만원 이상, 자동이체 3건 이상을 채우면 보통 골드 등급이 되고, 수수료 면제·환율 우대·대출 금리 할인이 풀려요\n2) 한 번에 너무 많이 옮기지 않기 — 자동이체 변경에 시간이 걸려서, 현실적으로 한 달에 2~3개가 관리 가능한 한계예요\n3) 메인 1곳 + 서브 1~2곳 구조 — 메인엔 급여·자동이체를 묶고, 서브는 우대금리 좋은 적금·이벤트 위주로 분산\n4) 카드 신규가입 페이백 이벤트도 체크 — 다만 혜택만 챙기고 바로 해지하는 '카드 풍차 돌리기'는 신용점수에 영향을 줄 수 있어요\n5) 지급 조건 미리 체크 — 보통 신청 후 30~60일 이내 지급되고, 다중 조건인 경우가 많아서 하나라도 누락하면 그 달 혜택이 아예 빠져요\n\n⚠️ '하루 몇만원 보장' 류의 과장 광고, 특히 SNS·커뮤니티에 도는 출처 불명 추천인 코드 이벤트는 검증되지 않은 경우가 많으니 조심하세요. 공식 은행 앱/홈페이지의 '이벤트' 탭에서 직접 확인하는 게 가장 안전해요.", date:"2026.07.21" },
  { id:"s16", category:"수익 늘리기", subcategory:"저난이도", title:"신용카드 실적 관리로 확정 캐시백 뽑기", desc:"이미 쓰는 돈에서 혜택만 더 챙기는 법", emoji:"💰",
    body:"어차피 쓸 돈이라면, 카드 실적 구간만 맞춰도 돈이 남아요.\n\n카드사 혜택 대부분은 '전월 실적 30만원 이상', '50만원 이상' 같은 구간별로 캐시백·할인율이 계단식으로 올라가요. 실적 구간을 살짝 넘기는 지점에서 혜택이 확 늘어나는 카드가 많아서, 월말에 카드 앱에서 이번 달 실적을 미리 확인하는 습관이 중요해요.\n\n【실전 팁】\n1) 주력 카드 1장의 실적 구간을 파악해두고, 매달 그 구간에 맞춰 지출을 몰아주기\n2) 실적 채우려고 안 쓸 돈까지 쓰는 건 본말전도 — 어차피 나갈 지출(공과금, 통신비 등)을 우선 배정\n3) 여러 카드를 쓰면 실적이 분산돼서 혜택 구간을 못 채우는 경우가 많아요. 카드는 최대 2장으로 압축하는 게 관리하기 편해요\n\n⚠️ 혜택만 챙기고 바로 해지하는 '카드 풍차 돌리기'는 신용점수에 영향을 줄 수 있어 신중하게 접근해야 해요.", date:"2026.07.22" },

  // ===== 부수입 로드맵: 2단계 (구조가 확실한 소액 투자) =====
  { id:"s17", category:"수익 늘리기", subcategory:"중난이도", title:"공모주 청약 완전 입문", desc:"균등배정 제도부터 첫 청약까지", emoji:"📋",
    body:"균등배정 제도 덕분에, 큰돈 없이도 청약 물량을 받을 수 있어요.\n\n공모주 청약은 최소 증거금만 넣어도 균등배정 몫을 받을 수 있는 구조라, 소액으로 시작 가능해요. 다만 상장 첫날 주가가 공모가 아래로 떨어지는 경우도 있으니 '무조건 수익'이라는 기대는 금물이에요.\n\n【청약 순서】\n1) 공모주 청약이 가능한 증권사 계좌 개설 (여러 증권사에 분산 청약 가능)\n2) 청약 일정 확인 (수요예측 → 공모가 확정 → 청약 → 환불 → 상장)\n3) 최소 증거금으로 균등배정 신청\n4) 상장일 매도 타이밍 판단 (첫날 매도 vs 보유)", date:"2026.07.23" },
  { id:"s18", category:"수익 늘리기", subcategory:"중난이도", title:"하이일드 공모주 펀드, 우선배정이 뭐길래", desc:"개인이 균등배정보다 더 받는 구조", emoji:"📊",
    body:"개인이 균등배정보다 더 받는 구조인데, 공짜는 아니에요.\n\n하이일드펀드에 가입하면 공모주 청약 시 우선배정 물량을 받을 수 있어요. 정부는 이 우선배정 혜택을 지속 연장하면서 코스닥 공모주 우선배정 비중을 5%에서 10%로 상향 조정하기도 했어요. 하이일드펀드는 자산의 상당 부분을 신용등급 BBB+ 이하 비우량채권에 투자해서 이 혜택을 받는 구조예요.\n\n【꼭 알아야 할 것】\n- 공모주 수익만 노리고 들어가도, 펀드 자체가 담고 있는 비우량채권에서 손실이 날 수 있어요\n- 세제 혜택도 있어요 — 1인당 3천만원 한도로, 가입일로부터 3년간 발생하는 이자·배당소득이 종합소득에 합산되지 않고 분리과세(15.4%)돼요\n- 단, 세제 혜택을 받으려면 최소 1년 이상 유지해야 하고, 1년 이내 해지하면 받은 혜택이 추징돼요", date:"2026.07.24" },
  { id:"s19", category:"수익 늘리기", subcategory:"중난이도", title:"청약통장 vs 예금, 지금 갈아타야 하나", desc:"청약 대기 중에도 손해 안 보는 법", emoji:"🏠",
    body:"이자율만 보고 해지하기 전에, 내 청약 계획부터 점검하세요.\n\n청약통장은 이자율이 낮은 편이라 '돈이 묶여서 손해'라고 느끼기 쉬워요. 하지만 청약 가점을 유지해야 하는 상황이라면, 해지보다는 유지하면서 다른 여윳돈으로 예금·투자를 병행하는 게 맞는 경우가 많아요.\n\n【점검 순서】\n1) 본인의 청약 가점 확인 (무주택 기간, 부양가족 수, 청약통장 가입기간)\n2) 향후 2~3년 내 청약 계획이 있는지\n3) 계획이 없다면 → 예금·적금으로 자금 효율화 검토\n4) 계획이 있다면 → 유지하되, 예치금 늘려서 청약 가능 평형 넓히기", date:"2026.07.25" },
  { id:"s20", category:"수익 늘리기", subcategory:"중난이도", title:"ELB로 원금 지키면서 조금 더 먹는 법", desc:"예금 이자보다 나은 원금보장형 상품", emoji:"🛡️",
    body:"원금은 지키고 싶은데 예금 이자는 아쉬운 사람들을 위한 상품이에요.\n\nELB(주가연계파생결합사채)는 원금이 보장되면서 예금보다 조금 더 높은 수익을 노릴 수 있는 상품이에요. 기초자산 가격 흐름에 따라 수익률이 달라지지만, 최악의 경우에도 원금은 지켜지는 구조가 핵심이에요.\n\n【주의할 것】\n- 예금자보호 대상이 아니에요 (발행 증권사 신용위험은 있음)\n- 중도 해지 시엔 원금 손실 가능성이 있어요 — 만기까지 들고 갈 수 있는 자금으로만\n- ELS와 헷갈리기 쉬운데, ELS는 원금 손실 가능한 상품이고 ELB는 원금보장형이라는 게 핵심 차이예요", date:"2026.07.26" },
];

let articles = [];
let activeMain = "전체";
let activeSub = "전체";

async function loadArticles() {
  let stored = [];
  try {
    const list = await window.storage.list('article:');
    if (list && list.keys && list.keys.length) {
      const results = await Promise.all(list.keys.map(k => window.storage.get(k).catch(()=>null)));
      stored = results.filter(Boolean).map(r => JSON.parse(r.value));
    }
  } catch (e) {
    console.error('불러오기 실패', e);
  }
  articles = [...stored, ...SEED].sort((a,b) => (b.date || '').localeCompare(a.date || ''));
  populateCategorySelects();
  render();
}

function populateCategorySelects() {
  const mainSel = document.getElementById('f-category');
  mainSel.innerHTML = Object.keys(CATS).map(c => `<option>${c}</option>`).join('');
  onMainCategoryChange();
}
function onMainCategoryChange() {
  const main = document.getElementById('f-category').value;
  const subSel = document.getElementById('f-subcategory');
  subSel.innerHTML = (CATS[main] || []).map(s => `<option>${s}</option>`).join('');
}

function render() {
  document.getElementById('issue-num').textContent = String(articles.length).padStart(2,'0');

  const featured = articles[0];
  const fc = document.getElementById('featured-card');
  if (featured) {
    fc.innerHTML = `
      <div class="featured-visual">${featured.emoji || '📝'}</div>
      <div class="featured-body">
        <div class="eyebrow">${featured.category} · ${featured.subcategory || ''}</div>
        <h2>${escapeHtml(featured.title)}</h2>
        <p>${escapeHtml(featured.desc || '')}</p>
        <span class="tip-badge" onclick="openDetail('${featured.id}')" style="cursor:pointer">자세히 보기 →</span>
      </div>`;
  }

  // main filter
  const fm = document.getElementById('filter-main');
  const mains = ["전체", ...Object.keys(CATS)];
  fm.innerHTML = mains.map(c => `<span class="ftag ${c===activeMain?'active':''}" onclick="setMainFilter('${c}')">${c}</span>`).join('');

  // sub filter
  const fs = document.getElementById('filter-sub');
  if (activeMain === "전체") {
    fs.innerHTML = '';
  } else {
    const subs = ["전체", ...CATS[activeMain]];
    fs.innerHTML = subs.map(s => `<span class="ftag ${s===activeSub?'active':''}" onclick="setSubFilter('${s}')">${s}</span>`).join('');
  }

  // grid
  let list = articles;
  if (activeMain !== "전체") list = list.filter(a => a.category === activeMain);
  if (activeMain !== "전체" && activeSub !== "전체") list = list.filter(a => a.subcategory === activeSub);

  const grid = document.getElementById('grid');
  if (!list.length) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="icon">📭</div>아직 이 카테고리엔 글이 없어요</div>`;
    return;
  }
  grid.innerHTML = list.map(a => `
    <div class="card" onclick="openDetail('${a.id}')">
      <div class="card-visual" style="background:${CAT_COLOR[a.category] || '#F1EEE6'}">
        ${a.emoji || CAT_EMOJI[a.category] || '📝'}
        <span class="card-badge">${a.subcategory || a.category}</span>
      </div>
      <div class="card-body">
        <div class="card-cat">${a.category} · ${a.date || ''}</div>
        <div class="card-title">${escapeHtml(a.title)}</div>
        <div class="card-desc">${escapeHtml(a.desc || '')}</div>
      </div>
    </div>
  `).join('');
}

function setMainFilter(c) { activeMain = c; activeSub = "전체"; render(); }
function setSubFilter(s) { activeSub = s; render(); }

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

function openAddModal() { document.getElementById('add-overlay').classList.add('show'); }
function closeAddModal() { document.getElementById('add-overlay').classList.remove('show'); }
function openDetail(id) {
  const a = articles.find(x => x.id === id);
  if (!a) return;
  document.getElementById('detail-content').innerHTML = `
    <div class="detail-cat">${a.category} · ${a.subcategory || ''}</div>
    <div class="detail-title">${escapeHtml(a.title)}</div>
    <div class="detail-meta">${a.date || ''}</div>
    <div class="detail-body">${escapeHtml(a.body || a.desc || '').split('\\n\\n').map(p=>`<p>${p.replace(/\\n/g,'<br>')}</p>`).join('')}</div>
  `;
  document.getElementById('detail-overlay').classList.add('show');
}
function closeDetailModal() { document.getElementById('detail-overlay').classList.remove('show'); }

async function submitArticle() {
  const title = document.getElementById('f-title').value.trim();
  const desc = document.getElementById('f-desc').value.trim();
  const category = document.getElementById('f-category').value;
  const subcategory = document.getElementById('f-subcategory').value;
  const emoji = document.getElementById('f-emoji').value.trim();
  const body = document.getElementById('f-body').value.trim();

  if (!title || !body) {
    showToast('제목이랑 본문은 꼭 채워주세요');
    return;
  }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = '저장 중...';

  const id = 'user_' + Date.now();
  const article = {
    id, title, desc, category, subcategory, emoji, body,
    date: new Date().toISOString().slice(0,10).replace(/-/g,'.')
  };

  try {
    const result = await window.storage.set('article:' + id, JSON.stringify(article));
    if (!result) throw new Error('저장 실패');
    document.getElementById('f-title').value = '';
    document.getElementById('f-desc').value = '';
    document.getElementById('f-emoji').value = '';
    document.getElementById('f-body').value = '';
    closeAddModal();
    showToast('가이드가 저장됐어요 🎉');
    await loadArticles();
  } catch (e) {
    console.error(e);
    showToast('저장에 실패했어요, 다시 시도해주세요');
  } finally {
    btn.disabled = false; btn.textContent = '가이드 저장하기';
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

loadArticles();

// ===== 성향진단 퀴즈 =====

    ]
  },
  {

    ]

const QUIZ_RESULTS = {
  low: {
    badge: "🟢 저위험 타입", cls: "low",
    title: "지키는 돈이 먼저인 타입",
    text: "지금 당신한텐 '지키는 돈'이 먼저예요. 예금, 국채, ELB처럼 원금이 보장되는 쪽부터 시작하는 게 맞아요. 화려한 수익률보다 잠 잘 오는 쪽이 이길 때가 많습니다."
  },
  mid: {
    badge: "🟡 중위험 타입", cls: "mid",
    title: "적당히 흔들려도 버티는 타입",
    text: "적당히 흔들려도 버틸 수 있는 체력이네요. 채권혼합형, 인컴형 ETF처럼 원금 변동은 있지만 완만한 쪽이 잘 맞아요. 몰빵보다는 분산이 정답인 구간이에요."
  },
  high: {
    badge: "🔴 고위험 타입", cls: "high",
    title: "리스크를 감당할 준비가 된 타입",
    text: "리스크를 감당할 준비가 된 타입이에요. ELS, 배당주, 리츠 같은 상품군도 시야에 넣어볼 만해요. 다만 '고위험 = 무조건 고수익'은 아니라는 것만 기억해두세요."
  }
};

let quizAnswers = [];
let quizStep = 0;

function openQuiz() {
  quizAnswers = [];
  quizStep = 0;
  document.getElementById('quiz-overlay').classList.add('show');
  renderQuizStep();
}
function closeQuiz() { document.getElementById('quiz-overlay').classList.remove('show'); }

function renderQuizStep() {
  const body = document.getElementById('quiz-body');
  if (quizStep >= QUIZ_QUESTIONS.length) {
    renderQuizResult();
    return;
  }
  const q = QUIZ_QUESTIONS[quizStep];
  body.innerHTML = `
    <div class="quiz-q">
      <div class="q-text">${q.text}</div>
      ${q.options.map((o,i) => `<button class="quiz-opt" onclick="answerQuiz(${i})">${o.label}</button>`).join('')}
    </div>
    <div style="font-family:var(--mono);font-size:11px;color:var(--ink-soft)">${quizStep+1} / ${QUIZ_QUESTIONS.length}</div>
  `;
}

function answerQuiz(optionIndex) {
  const q = QUIZ_QUESTIONS[quizStep];
  quizAnswers.push(q.options[optionIndex].score);
  quizStep++;
  renderQuizStep();
}

function renderQuizResult() {
  const total = quizAnswers.reduce((a,b)=>a+b, 0);
  let key = 'low';
  if (total >= 4) key = 'high';
  else if (total >= 2) key = 'mid';
  const r = QUIZ_RESULTS[key];

  document.getElementById('quiz-body').innerHTML = `
    <div class="quiz-result">
      <span class="badge ${r.cls}">${r.badge}</span>
      <h4>${r.title}</h4>
      <p>${r.text}</p>
      <div class="quiz-disclaimer">
        <b>이 결과는 참고용 나침반이지, 정답지가 아니에요.</b><br><br>
        여기 나온 상품군은 "이런 특성이 있다" 정도의 방향 제시일 뿐, 실제로 뭘 살지 결정하고 그 결과를 책임지는 건 결국 당신 몫이에요. 큰돈 움직이기 전엔 꼭 전문가 상담 한 번 거치세요. 저흰 조언 한 스푼을 얹어드릴 뿐, 투자 버튼은 항상 본인이 누르는 거니까요.
      </div>
      <button class="quiz-restart" onclick="openQuiz()">다시 진단하기</button>
    </div>
  `;
}
